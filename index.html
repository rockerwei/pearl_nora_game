<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffb74d" />
  <title>數字學習小遊戲</title>
  <style>
    :root{
      --bg1:#fff8e8;
      --bg2:#eef7ff;
      --card:#ffffff;
      --text:#2f2f2f;
      --muted:#7a7a7a;
      --line:#ececec;
      --blue:#64b5f6;
      --orange:#ff8a65;
      --green:#66bb6a;
      --red:#ef5350;
      --shadow:0 10px 28px rgba(0,0,0,.08);
      --radius:22px;
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html, body{
      margin:0;
      padding:0;
      min-height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
    }

    body{
      display:flex;
      justify-content:center;
    }

    .app{
      width:100%;
      max-width:760px;
      min-height:100vh;
      padding:14px 14px 24px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }

    .title-wrap{
      display:flex;
      flex-direction:column;
      gap:2px;
    }

    .title{
      margin:0;
      font-size:24px;
      font-weight:900;
      letter-spacing:.5px;
    }

    .subtitle{
      margin:0;
      font-size:13px;
      color:var(--muted);
    }

    .top-actions{
      display:flex;
      gap:8px;
      flex-shrink:0;
    }

    .icon-btn,
    .parent-toggle,
    .mini-btn,
    .answer-btn,
    .main-sound-btn{
      border:none;
      outline:none;
      cursor:pointer;
      border-radius:16px;
      background:#fff;
      color:var(--text);
      box-shadow:var(--shadow);
    }

    .icon-btn{
      min-width:44px;
      height:44px;
      padding:0 14px;
      font-size:18px;
      font-weight:800;
    }

    .card{
      background:var(--card);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:18px 16px 16px;
    }

    .question-wrap{
      text-align:center;
    }

    .range-chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:30px;
      padding:0 12px;
      border-radius:999px;
      background:#fff6ef;
      color:#d97745;
      font-size:13px;
      font-weight:800;
      margin-bottom:10px;
    }

    .big-number{
      margin:8px 0 8px;
      font-size:76px;
      line-height:1;
      font-weight:900;
      letter-spacing:1px;
    }

    .hint{
      margin:0;
      font-size:14px;
      color:var(--muted);
    }

    .main-actions{
      display:flex;
      justify-content:center;
      margin-top:14px;
    }

    .main-sound-btn{
      min-height:52px;
      padding:0 20px;
      font-size:18px;
      font-weight:900;
      background:linear-gradient(180deg,#fff,#fff7f1);
    }

    .answers{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
      margin-top:18px;
    }

    .answer-btn{
      min-height:74px;
      padding:12px 10px;
      font-size:28px;
      font-weight:900;
      transition:transform .12s ease, opacity .12s ease, background .2s ease;
    }

    .answer-btn:active{
      transform:scale(.98);
    }

    .answer-btn.correct{
      background:#eefaf0;
      color:#2e7d32;
    }

    .answer-btn.wrong{
      background:#fff2f2;
      color:#c62828;
    }

    .answer-btn.disabled{
      pointer-events:none;
      opacity:.85;
    }

    .bottom-bar{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .pill{
      background:rgba(255,255,255,.9);
      border-radius:999px;
      padding:9px 13px;
      font-size:13px;
      color:var(--muted);
      box-shadow:0 4px 12px rgba(0,0,0,.05);
      font-weight:700;
    }

    .msg{
      text-align:center;
      min-height:24px;
      margin-top:12px;
      font-size:15px;
      font-weight:900;
    }

    .msg.ok{ color:var(--green); }
    .msg.no{ color:var(--red); }

    .parent-wrap{
      margin-top:14px;
    }

    .parent-toggle{
      width:100%;
      min-height:48px;
      padding:0 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      font-size:15px;
      font-weight:900;
    }

    .arrow{
      transition:transform .2s ease;
    }

    .arrow.open{
      transform:rotate(180deg);
    }

    .parent-panel{
      margin-top:10px;
      background:rgba(255,255,255,.94);
      border-radius:22px;
      padding:12px;
      box-shadow:var(--shadow);
    }

    .hidden{
      display:none;
    }

    .parent-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:8px;
    }

    .range-btn{
      border:none;
      cursor:pointer;
      border-radius:14px;
      background:#fff;
      box-shadow:0 4px 14px rgba(0,0,0,.06);
      min-height:48px;
      padding:10px;
      font-size:15px;
      font-weight:900;
      color:var(--text);
    }

    .range-btn.active{
      background:#fff4eb;
      color:#d97745;
      outline:2px solid #ffd0b2;
    }

    .parent-actions{
      display:flex;
      gap:8px;
      margin-top:10px;
    }

    .mini-btn{
      flex:1;
      min-height:44px;
      padding:0 12px;
      font-size:14px;
      font-weight:900;
    }

    .mini-btn.danger{
      background:#fff3f2;
      color:#d94b38;
    }

    .footer-note{
      text-align:center;
      font-size:12px;
      color:#9a9a9a;
      margin-top:16px;
    }

    @media (max-width:640px){
      .app{
        padding:12px 12px 22px;
      }

      .title{
        font-size:21px;
      }

      .subtitle{
        font-size:12px;
      }

      .big-number{
        font-size:62px;
      }

      .answer-btn{
        min-height:68px;
        font-size:24px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title-wrap">
        <h1 class="title">數字學習小遊戲</h1>
        <p class="subtitle">看數字、聽發音、選正確答案</p>
      </div>

      <div class="top-actions">
        <button id="replayBtn" class="icon-btn" type="button" title="重聽">🔊</button>
      </div>
    </div>

    <section class="card">
      <div class="question-wrap">
        <div class="range-chip">目前區間：<span id="rangeLabel" style="margin-left:6px;">1–10</span></div>
        <div id="bigNumber" class="big-number">1</div>
        <p class="hint">點喇叭可再聽一次</p>

        <div class="main-actions">
          <button id="speakBtn" class="main-sound-btn" type="button">🔊 播放數字</button>
        </div>
      </div>

      <div id="answers" class="answers"></div>

      <div id="message" class="msg"></div>

      <div class="bottom-bar">
        <div class="pill">進度：<span id="progressLabel">1 / 10</span></div>
        <div class="pill">答對：<span id="correctLabel">0</span></div>
      </div>
    </section>

    <section class="parent-wrap">
      <button id="parentToggle" class="parent-toggle" type="button" aria-expanded="false">
        <span>家長模式</span>
        <span id="parentArrow" class="arrow">▾</span>
      </button>

      <div id="parentPanel" class="parent-panel hidden">
        <div class="parent-grid" id="rangeGrid">
          <button class="range-btn active" data-start="1" data-end="10">1–10</button>
          <button class="range-btn" data-start="11" data-end="20">11–20</button>
          <button class="range-btn" data-start="21" data-end="30">21–30</button>
          <button class="range-btn" data-start="31" data-end="40">31–40</button>
          <button class="range-btn" data-start="41" data-end="50">41–50</button>
          <button class="range-btn" data-start="51" data-end="60">51–60</button>
          <button class="range-btn" data-start="61" data-end="70">61–70</button>
          <button class="range-btn" data-start="71" data-end="80">71–80</button>
          <button class="range-btn" data-start="81" data-end="90">81–90</button>
          <button class="range-btn" data-start="91" data-end="100">91–100</button>
        </div>

        <div class="parent-actions">
          <button id="resetProgressBtn" class="mini-btn danger" type="button">重置進度</button>
          <button id="closeParentBtn" class="mini-btn" type="button">收合</button>
        </div>
      </div>
    </section>

    <div class="footer-note">第一次若沒聲音，請先手動按一次播放按鈕</div>
  </div>

  <script>
    const bigNumber = document.getElementById("bigNumber");
    const answersWrap = document.getElementById("answers");
    const messageEl = document.getElementById("message");
    const rangeLabel = document.getElementById("rangeLabel");
    const progressLabel = document.getElementById("progressLabel");
    const correctLabel = document.getElementById("correctLabel");
    const speakBtn = document.getElementById("speakBtn");
    const replayBtn = document.getElementById("replayBtn");

    const parentToggle = document.getElementById("parentToggle");
    const parentPanel = document.getElementById("parentPanel");
    const parentArrow = document.getElementById("parentArrow");
    const closeParentBtn = document.getElementById("closeParentBtn");
    const resetProgressBtn = document.getElementById("resetProgressBtn");
    const rangeButtons = Array.from(document.querySelectorAll(".range-btn"));

    let currentRangeStart = 1;
    let currentRangeEnd = 10;
    let currentNumber = 1;
    let currentOptions = [];
    let currentIndex = 0;
    let correctCount = 0;
    let answeredLock = false;

    function setParentPanel(open){
      parentPanel.classList.toggle("hidden", !open);
      parentArrow.classList.toggle("open", open);
      parentToggle.setAttribute("aria-expanded", open ? "true" : "false");
    }

    function shuffle(arr){
      const a = [...arr];
      for(let i = a.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function randomInt(min, max){
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function getWrongOptions(answer, start, end, count = 3){
      const set = new Set();
      while(set.size < count){
        const n = randomInt(start, end);
        if(n !== answer) set.add(n);
      }
      return [...set];
    }

    function getProgressTotal(){
      return currentRangeEnd - currentRangeStart + 1;
    }

    function updateLabels(){
      rangeLabel.textContent = `${currentRangeStart}–${currentRangeEnd}`;
      progressLabel.textContent = `${currentIndex + 1} / ${getProgressTotal()}`;
      correctLabel.textContent = `${correctCount}`;
    }

    function clearMessage(){
      messageEl.textContent = "";
      messageEl.className = "msg";
    }

    function setMessage(text, type){
      messageEl.textContent = text;
      messageEl.className = `msg ${type || ""}`.trim();
    }

    function numberToSpeechText(n){
      return String(n);
    }

    function getPreferredVoice(langPrefix = "en"){
      const voices = speechSynthesis.getVoices() || [];
      const exact = voices.find(v => v.lang && v.lang.toLowerCase() === "en-us");
      if(exact) return exact;

      const starts = voices.find(v => v.lang && v.lang.toLowerCase().startsWith(langPrefix));
      if(starts) return starts;

      return voices[0] || null;
    }

    function speakText(text){
      try{
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        const voice = getPreferredVoice("en");
        if(voice) utter.voice = voice;
        utter.lang = voice?.lang || "en-US";
        utter.rate = 0.9;
        utter.pitch = 1.05;
        utter.volume = 1;
        window.speechSynthesis.speak(utter);
      }catch(e){
        console.error("speak error:", e);
      }
    }

    function speakCurrentNumber(){
      speakText(numberToSpeechText(currentNumber));
    }

    function renderAnswers(){
      answersWrap.innerHTML = "";
      currentOptions.forEach(num => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "answer-btn";
        btn.textContent = num;
        btn.dataset.value = num;
        btn.addEventListener("click", () => checkAnswer(num, btn));
        answersWrap.appendChild(btn);
      });
    }

    function generateQuestion(){
      answeredLock = false;
      clearMessage();

      currentNumber = currentRangeStart + currentIndex;
      bigNumber.textContent = currentNumber;

      const wrongs = getWrongOptions(currentNumber, currentRangeStart, currentRangeEnd, 3);
      currentOptions = shuffle([currentNumber, ...wrongs]);

      renderAnswers();
      updateLabels();

      setTimeout(() => {
        speakCurrentNumber();
      }, 250);
    }

    function disableAnswers(){
      document.querySelectorAll(".answer-btn").forEach(btn => {
        btn.classList.add("disabled");
      });
    }

    function markCorrectAnswer(){
      document.querySelectorAll(".answer-btn").forEach(btn => {
        if(Number(btn.dataset.value) === currentNumber){
          btn.classList.add("correct");
        }
      });
    }

    function checkAnswer(selected, clickedBtn){
      if(answeredLock) return;
      answeredLock = true;

      disableAnswers();

      if(selected === currentNumber){
        clickedBtn.classList.add("correct");
        correctCount++;
        updateLabels();
        setMessage("答對了！", "ok");
        speakText("Great job");

        setTimeout(() => {
          goNext();
        }, 900);
      }else{
        clickedBtn.classList.add("wrong");
        markCorrectAnswer();
        setMessage("再試下一題", "no");
        speakCurrentNumber();

        setTimeout(() => {
          goNext();
        }, 1100);
      }
    }

    function goNext(){
      const total = getProgressTotal();
      if(currentIndex < total - 1){
        currentIndex++;
        generateQuestion();
      }else{
        showFinished();
      }
    }

    function showFinished(){
      bigNumber.textContent = "🎉";
      answersWrap.innerHTML = "";
      setMessage(`完成 ${currentRangeStart}–${currentRangeEnd}！答對 ${correctCount} 題`, "ok");
      progressLabel.textContent = `${getProgressTotal()} / ${getProgressTotal()}`;
    }

    function setRange(start, end){
      currentRangeStart = start;
      currentRangeEnd = end;
      currentIndex = 0;
      correctCount = 0;

      rangeButtons.forEach(btn => {
        const s = Number(btn.dataset.start);
        const e = Number(btn.dataset.end);
        btn.classList.toggle("active", s === start && e === end);
      });

      updateLabels();
      generateQuestion();
      setParentPanel(false);
    }

    function resetProgress(){
      currentIndex = 0;
      correctCount = 0;
      updateLabels();
      generateQuestion();
      setMessage("已重置進度", "ok");
      setTimeout(clearMessage, 800);
    }

    parentToggle.addEventListener("click", () => {
      const isOpen = !parentPanel.classList.contains("hidden");
      setParentPanel(!isOpen);
    });

    closeParentBtn.addEventListener("click", () => {
      setParentPanel(false);
    });

    resetProgressBtn.addEventListener("click", () => {
      resetProgress();
    });

    rangeButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        const start = Number(btn.dataset.start);
        const end = Number(btn.dataset.end);
        setRange(start, end);
      });
    });

    speakBtn.addEventListener("click", speakCurrentNumber);
    replayBtn.addEventListener("click", speakCurrentNumber);
    bigNumber.addEventListener("click", speakCurrentNumber);

    window.speechSynthesis.onvoiceschanged = () => {
      // 讓 voice list 載入完成
    };

    setParentPanel(false);
    updateLabels();
    generateQuestion();
  </script>
</body>
</html>
