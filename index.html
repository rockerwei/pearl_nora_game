<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>語音測試</title>
  <style>
    body{
      font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif;
      padding:24px;
      background:#f7f7f7;
      color:#222;
    }
    .wrap{
      max-width:560px;
      margin:0 auto;
      background:#fff;
      padding:20px;
      border-radius:16px;
      box-shadow:0 8px 24px rgba(0,0,0,.08);
    }
    button, select{
      font-size:18px;
      padding:14px 16px;
      border-radius:12px;
      border:1px solid #ddd;
      margin:8px 0;
      width:100%;
    }
    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    #log{
      margin-top:16px;
      padding:12px;
      background:#111;
      color:#0f0;
      border-radius:12px;
      min-height:120px;
      white-space:pre-wrap;
      font-size:13px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>語音測試頁</h2>

    <select id="voiceSelect"></select>

    <div class="row">
      <button id="speakZh">念：ㄅ</button>
      <button id="speakEn">念：A</button>
    </div>

    <div class="row">
      <button id="speakNum">念：1</button>
      <button id="beepBtn">嗶聲測試</button>
    </div>

    <button id="reloadVoices">重新讀取 voices</button>

    <div id="log"></div>
  </div>

  <script>
    let audioCtx = null;
    let voices = [];

    const logEl = document.getElementById("log");
    const voiceSelect = document.getElementById("voiceSelect");

    function log(msg) {
      console.log(msg);
      logEl.textContent += msg + "\\n";
    }

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        log("AudioContext 建立: " + audioCtx.state);
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume().then(() => {
          log("AudioContext resume 後: " + audioCtx.state);
        }).catch(err => {
          log("AudioContext resume 失敗: " + err);
        });
      }
    }

    function beep() {
      initAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.value = 660;
      gain.gain.value = 0.05;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.25);
      log("播放 beep");
    }

    function loadVoices() {
      voices = window.speechSynthesis.getVoices();
      voiceSelect.innerHTML = "";

      if (!voices.length) {
        log("找不到 voices");
        return;
      }

      voices.forEach((v, i) => {
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = `${v.name} | ${v.lang}`;
        voiceSelect.appendChild(opt);
      });

      const zhTWIndex = voices.findIndex(v => v.lang === "zh-TW");
      const enUSIndex = voices.findIndex(v => v.lang === "en-US");

      if (zhTWIndex >= 0) {
        voiceSelect.value = zhTWIndex;
      } else if (enUSIndex >= 0) {
        voiceSelect.value = enUSIndex;
      }

      log("voices 數量: " + voices.length);
      voices.slice(0, 10).forEach(v => log(`- ${v.name} (${v.lang})`));
    }

    function speak(text, lang) {
      initAudio();

      if (!("speechSynthesis" in window)) {
        log("此瀏覽器不支援 speechSynthesis");
        return;
      }

      window.speechSynthesis.cancel();

      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = lang;
      utter.rate = 0.8;
      utter.pitch = 1;
      utter.volume = 1;

      const selectedVoice = voices[Number(voiceSelect.value)];
      if (selectedVoice) {
        utter.voice = selectedVoice;
        utter.lang = selectedVoice.lang;
        log(`使用 voice: ${selectedVoice.name} (${selectedVoice.lang})`);
      } else {
        log("未指定 voice，使用瀏覽器預設");
      }

      utter.onstart = () => log(`開始朗讀: ${text}`);
      utter.onend = () => log(`朗讀結束: ${text}`);
      utter.onerror = (e) => log(`朗讀錯誤: ${text} | ${e.error}`);

      window.speechSynthesis.speak(utter);
    }

    document.getElementById("speakZh").addEventListener("click", () => {
      speak("ㄅ", "zh-TW");
    });

    document.getElementById("speakEn").addEventListener("click", () => {
      speak("A", "en-US");
    });

    document.getElementById("speakNum").addEventListener("click", () => {
      speak("一", "zh-TW");
    });

    document.getElementById("beepBtn").addEventListener("click", () => {
      beep();
    });

    document.getElementById("reloadVoices").addEventListener("click", () => {
      loadVoices();
    });

    window.speechSynthesis.onvoiceschanged = () => {
      log("onvoiceschanged 觸發");
      loadVoices();
    };

    setTimeout(loadVoices, 300);
    setTimeout(loadVoices, 1000);
    setTimeout(loadVoices, 2000);

    log("頁面載入完成");
  </script>
</body>
</html>
