<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f4ea" />
  <title>數字學習小遊戲</title>
  <style>
    :root{
      --bg:#f7f4ea;
      --card:#ffffff;
      --text:#2f2f2f;
      --muted:#7f7f7f;
      --ok:#4caf50;
      --bad:#ef5350;
      --shadow:0 10px 30px rgba(0,0,0,.08);
      --radius:28px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
    }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      background:var(--bg);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
      overflow:hidden;
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .app{
      position:relative;
      width:min(100vw, 1024px);
      height:min(100vh, 820px);
      padding:18px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .board{
      width:100%;
      max-width:900px;
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:18px;
    }

    .choice{
      position:relative;
      border:none;
      border-radius:32px;
      background:var(--card);
      color:var(--text);
      box-shadow:var(--shadow);
      min-height:200px;
      font-size:clamp(44px, 10vw, 88px);
      font-weight:900;
      cursor:pointer;
      transition:transform .15s ease, box-shadow .2s ease, background .2s ease, opacity .2s ease;
    }

    .choice:active{
      transform:scale(.98);
    }

    .choice.correct{
      background:#eef9f0;
      color:#2e7d32;
      animation:correctPop .9s ease forwards;
      z-index:2;
    }

    .choice.wrong{
      background:#fff2f2;
      color:#c62828;
    }

    .choice.reveal{
      outline:4px solid rgba(76,175,80,.22);
    }

    .choice.disabled{
      pointer-events:none;
      opacity:.92;
    }

    .stars{
      position:absolute;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      border-radius:32px;
    }

    .star{
      position:absolute;
      font-size:28px;
      opacity:0;
      animation:starBurst .9s ease forwards;
    }

    .flash{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      opacity:0;
      z-index:5;
      font-size:clamp(44px, 8vw, 76px);
      font-weight:900;
      color:#ffb300;
      text-shadow:0 6px 20px rgba(0,0,0,.08);
    }

    .flash.show{
      animation:flashShow 1s ease forwards;
    }

    .tap-layer{
      position:absolute;
      inset:0;
      z-index:1;
      background:transparent;
    }

    .finish{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:16px;
      background:rgba(247,244,234,.96);
      z-index:10;
      text-align:center;
      padding:24px;
    }

    .finish.show{
      display:flex;
    }

    .finish-emoji{
      font-size:72px;
    }

    .finish-text{
      font-size:clamp(28px, 5vw, 44px);
      font-weight:900;
      color:var(--text);
    }

    .finish-sub{
      font-size:18px;
      color:var(--muted);
      font-weight:700;
    }

    @keyframes correctPop{
      0%   { transform:scale(1); }
      20%  { transform:scale(1.06) rotate(-1deg); }
      40%  { transform:scale(1.02) rotate(1deg); }
      60%  { transform:scale(1.07) rotate(-1deg); }
      100% { transform:scale(1.02); }
    }

    @keyframes starBurst{
      0%{
        transform:translate(0,0) scale(.3) rotate(0deg);
        opacity:0;
      }
      20%{
        opacity:1;
      }
      100%{
        transform:translate(var(--tx), var(--ty)) scale(1.2) rotate(180deg);
        opacity:0;
      }
    }

    @keyframes flashShow{
      0%{
        transform:scale(.7);
        opacity:0;
      }
      25%{
        transform:scale(1.06);
        opacity:1;
      }
      70%{
        transform:scale(1);
        opacity:1;
      }
      100%{
        transform:scale(.95);
        opacity:0;
      }
    }

    @media (max-width: 768px){
      .app{
        padding:14px;
      }
      .board{
        gap:14px;
      }
      .choice{
        min-height:150px;
        border-radius:24px;
      }
      .stars{
        border-radius:24px;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="tap-layer" id="tapLayer" aria-hidden="true"></div>

    <div class="board" id="board"></div>

    <div class="flash" id="flash">✨ 好棒！</div>

    <div class="finish" id="finish">
      <div class="finish-emoji">🎉</div>
      <div class="finish-text">完成了</div>
      <div class="finish-sub">點一下畫面重新開始</div>
    </div>
  </div>

  <script>
    const board = document.getElementById("board");
    const flash = document.getElementById("flash");
    const finish = document.getElementById("finish");
    const tapLayer = document.getElementById("tapLayer");

    const MIN = 1;
    const MAX = 100;

    let numbers = [];
    let index = 0;
    let answer = null;
    let options = [];
    let locked = false;
    let finished = false;

    function shuffle(arr){
      const a = [...arr];
      for(let i = a.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function range(start, end){
      return Array.from({ length:end - start + 1 }, (_, i) => start + i);
    }

    function randomInt(min, max){
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function getWrongOptions(correct, count = 3){
      const set = new Set();
      while(set.size < count){
        const n = randomInt(MIN, MAX);
        if(n !== correct) set.add(n);
      }
      return [...set];
    }

    function getPreferredVoice(langPrefix = "en"){
      const voices = speechSynthesis.getVoices() || [];
      return (
        voices.find(v => v.lang && v.lang.toLowerCase() === "en-us") ||
        voices.find(v => v.lang && v.lang.toLowerCase().startsWith(langPrefix)) ||
        voices[0] ||
        null
      );
    }

    function speakText(text){
      try{
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        const voice = getPreferredVoice("en");
        if(voice) utter.voice = voice;
        utter.lang = voice?.lang || "en-US";
        utter.rate = 0.88;
        utter.pitch = 1.03;
        utter.volume = 1;
        window.speechSynthesis.speak(utter);
      }catch(err){
        console.error("speech error", err);
      }
    }

    function speakCurrent(){
      if(answer == null || finished) return;
      speakText(String(answer));
    }

    function buildQuestion(){
      answer = numbers[index];
      options = shuffle([answer, ...getWrongOptions(answer, 3)]);
      renderOptions();
      setTimeout(() => {
        speakCurrent();
      }, 250);
    }

    function renderOptions(){
      board.innerHTML = "";
      options.forEach(num => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.type = "button";
        btn.dataset.value = String(num);
        btn.innerHTML = `
          <span>${num}</span>
          <div class="stars"></div>
        `;
        btn.addEventListener("click", () => checkAnswer(num, btn));
        board.appendChild(btn);
      });
    }

    function disableAll(){
      document.querySelectorAll(".choice").forEach(el => {
        el.classList.add("disabled");
      });
    }

    function revealAnswer(){
      document.querySelectorAll(".choice").forEach(el => {
        if(Number(el.dataset.value) === answer){
          el.classList.add("correct", "reveal");
        }
      });
    }

    function burstStars(btn){
      const layer = btn.querySelector(".stars");
      if(!layer) return;
      layer.innerHTML = "";

      const positions = [
        ["-90px","-70px"], ["0px","-90px"], ["90px","-60px"],
        ["-110px","10px"], ["110px","0px"],
        ["-80px","80px"], ["0px","95px"], ["85px","75px"]
      ];

      positions.forEach((p, i) => {
        const star = document.createElement("div");
        star.className = "star";
        star.textContent = i % 2 === 0 ? "⭐" : "✨";
        star.style.left = "50%";
        star.style.top = "50%";
        star.style.setProperty("--tx", p[0]);
        star.style.setProperty("--ty", p[1]);
        layer.appendChild(star);
      });
    }

    function showPraise(){
      flash.classList.remove("show");
      void flash.offsetWidth;
      flash.classList.add("show");
    }

    function goNext(){
      if(index < numbers.length - 1){
        index++;
        locked = false;
        buildQuestion();
      }else{
        finished = true;
        finish.classList.add("show");
      }
    }

    function checkAnswer(selected, btn){
      if(locked || finished) return;
      locked = true;
      disableAll();

      if(selected === answer){
        btn.classList.add("correct");
        burstStars(btn);
        showPraise();
        speakText("Great job");

        setTimeout(() => {
          goNext();
        }, 1200);
      }else{
        btn.classList.add("wrong");
        revealAnswer();
        speakCurrent();

        setTimeout(() => {
          goNext();
        }, 1100);
      }
    }

    function restart(){
      finished = false;
      finish.classList.remove("show");
      index = 0;
      numbers = shuffle(range(MIN, MAX));
      locked = false;
      buildQuestion();
    }

    tapLayer.addEventListener("click", () => {
      if(finished){
        restart();
        return;
      }
      if(!locked){
        speakCurrent();
      }
    });

    finish.addEventListener("click", restart);

    window.speechSynthesis.onvoiceschanged = () => {};

    restart();
  </script>
</body>
</html>
