<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffb7d8" />
  <title>兒童學習小遊戲</title>
  <style>
    :root{
      --bg1:#fff7fb;
      --bg2:#f5f0ff;
      --bg3:#fffaf1;
      --ink:#6c4e69;
      --pink:#ff8fbd;
      --pink2:#ffc7df;
      --purple:#b895ff;
      --purple2:#8c75ff;
      --gold:#ffca59;
      --blue:#92caff;
      --green:#7fd9a8;
      --card:#ffffffee;
      --shadow:0 14px 36px rgba(166,116,166,.14);
      --radius:26px;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 14% 18%, rgba(255,255,255,.96) 0%, rgba(255,255,255,0) 22%),
        radial-gradient(circle at 82% 18%, rgba(255,239,200,.92) 0%, rgba(255,239,200,0) 18%),
        radial-gradient(circle at 28% 80%, rgba(255,214,233,.72) 0%, rgba(255,214,233,0) 26%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 48%, var(--bg3));
    }

    body{
      position:relative;
      overflow:hidden;
      user-select:none;
    }

    .bg-stars,.fx-layer,.confetti-layer,.intro-particles,.mega-celebrate-layer{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .star{
      position:absolute;
      width:10px;
      height:10px;
      border-radius:50%;
      background:radial-gradient(circle, #fff 0 28%, #ffe380 29% 58%, rgba(255,255,255,0) 59%);
      filter:drop-shadow(0 0 10px rgba(255,255,255,.9));
      opacity:.9;
      animation:twinkle ease-in-out infinite;
    }

    @keyframes twinkle{
      0%,100%{transform:scale(.55);opacity:.35}
      50%{transform:scale(1.45);opacity:1}
    }

    .top-bar{
      position:absolute;
      top:max(12px, env(safe-area-inset-top));
      left:50%;
      transform:translateX(-50%);
      z-index:20;
      width:min(980px, calc(100% - 20px));
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.74);
      backdrop-filter:blur(10px);
      box-shadow:0 10px 28px rgba(163,120,166,.12);
      border:1px solid rgba(255,255,255,.82);
    }

    .chip{
      display:flex;
      align-items:center;
      gap:8px;
      font-weight:900;
      color:#7a5976;
      white-space:nowrap;
      min-width:0;
    }

    .chip.center{
      flex:1;
      justify-content:center;
      text-align:center;
      font-size:14px;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .icon-btn{
      border:none;
      background:linear-gradient(180deg,#fff,#fff7fb);
      color:#7d5b79;
      border-radius:999px;
      min-width:42px;
      height:42px;
      padding:0 14px;
      font-size:14px;
      font-weight:900;
      box-shadow:0 8px 18px rgba(163,120,166,.10);
      cursor:pointer;
    }

    .icon-btn:active{transform:scale(.97)}

    .parent-panel{
      position:absolute;
      left:12px;
      top:max(72px, calc(env(safe-area-inset-top) + 58px));
      z-index:30;
      width:min(340px, calc(100% - 24px));
      border-radius:24px;
      background:rgba(255,255,255,.78);
      backdrop-filter:blur(12px);
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,.86);
      overflow:hidden;
    }

    .parent-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:14px 16px;
      cursor:pointer;
      font-weight:900;
      color:#765571;
    }

    .parent-body{
      padding:0 16px 16px;
      border-top:1px solid rgba(230,210,232,.7);
      display:none;
    }

    .parent-panel.open .parent-body{display:block}

    .section-title{
      margin:14px 0 8px;
      font-size:13px;
      font-weight:900;
      color:#8f7790;
    }

    .btn-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:8px;
    }

    .small-btn{
      border:none;
      min-height:40px;
      padding:8px 10px;
      border-radius:14px;
      background:#fff;
      color:#7b5a78;
      font-weight:900;
      box-shadow:0 6px 14px rgba(160,120,160,.08);
      cursor:pointer;
    }

    .small-btn.active{
      background:linear-gradient(135deg,#ff9ec8,#c19bff);
      color:#fff;
    }

    .single-row{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:8px;
    }

    .game{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-end;
      padding:
        calc(env(safe-area-inset-top) + 78px)
        16px
        max(18px, env(safe-area-inset-bottom))
        16px;
      z-index:5;
    }

    .question-wrap{
      width:min(980px, 100%);
      display:flex;
      flex-direction:column;
      align-items:center;
      margin-bottom:14px;
      transition:opacity .18s ease, transform .18s ease;
    }

    .question-bubble{
      width:min(760px, 100%);
      min-height:72px;
      padding:14px 18px;
      border-radius:24px;
      background:rgba(255,255,255,.84);
      backdrop-filter:blur(8px);
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      gap:2px;
    }

    .question-main{
      font-size:30px;
      font-weight:900;
      letter-spacing:.5px;
      color:#6f4d6d;
    }

    .question-sub{
      font-size:13px;
      font-weight:800;
      color:#99809a;
      min-height:16px;
    }

    .cards{
      width:min(980px, 100%);
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:14px;
      opacity:0;
      transform:translateY(16px);
      transition:opacity .15s ease, transform .15s ease;
    }

    .cards.ready{
      opacity:1;
      transform:translateY(0);
    }

    .card{
      position:relative;
      min-height:220px;
      border:none;
      border-radius:var(--radius);
      background:linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.88));
      box-shadow:var(--shadow);
      overflow:hidden;
      cursor:pointer;
      padding:14px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
    }

    .card:active{transform:scale(.98)}
    .card[disabled]{opacity:.72;cursor:default}

    .card::before{
      content:"";
      position:absolute;
      inset:-2px;
      border-radius:inherit;
      padding:2px;
      background:linear-gradient(135deg, rgba(255,172,209,.95), rgba(187,147,255,.9), rgba(255,223,138,.92));
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite:xor;
      mask-composite:exclude;
      pointer-events:none;
    }

    .card-glow{
      position:absolute;
      width:140px;
      height:140px;
      top:-28px;
      right:-20px;
      border-radius:999px;
      background:radial-gradient(circle, rgba(255,192,218,.58), rgba(255,192,218,0));
      pointer-events:none;
    }

    .card-figure{
      width:100%;
      height:150px;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    .big-symbol{
      font-size:68px;
      font-weight:900;
      line-height:1;
      color:#6f4d6d;
      text-shadow:0 6px 16px rgba(190,150,200,.16);
    }

    .card-img{
      width:min(138px, 72%);
      height:min(138px, 72%);
      object-fit:contain;
      display:block;
      filter:drop-shadow(0 10px 20px rgba(0,0,0,.10));
    }

    .fallback-svg{
      width:min(148px, 78%);
      height:min(148px, 78%);
      display:none;
      filter:drop-shadow(0 10px 18px rgba(0,0,0,.08));
    }

    .card-label{
      margin-top:8px;
      text-align:center;
      font-size:24px;
      font-weight:900;
      color:#72516d;
      letter-spacing:.5px;
    }

    .card-sub{
      margin-top:4px;
      font-size:13px;
      font-weight:800;
      color:#9a7f98;
      text-align:center;
      min-height:18px;
    }

    .correct-mark,.wrong-mark{
      position:absolute;
      inset:auto 50% 18px auto;
      transform:translateX(50%);
      font-size:28px;
      font-weight:900;
      opacity:0;
      pointer-events:none;
    }
    .correct-mark{color:#4fb97e}
    .wrong-mark{color:#ff709f}

    .show-mark{
      animation:markPop .7s ease forwards;
    }

    @keyframes markPop{
      0%{opacity:0;transform:translateX(50%) scale(.4)}
      25%{opacity:1;transform:translateX(50%) scale(1.16)}
      100%{opacity:0;transform:translateX(50%) scale(1)}
    }

    .message-pop{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%) scale(.8);
      z-index:60;
      padding:16px 24px;
      border-radius:999px;
      background:rgba(255,255,255,.92);
      box-shadow:0 18px 36px rgba(163,120,166,.16);
      font-size:24px;
      font-weight:900;
      color:#765672;
      opacity:0;
      pointer-events:none;
    }

    .message-pop.show{
      animation:popText .9s ease forwards;
    }

    @keyframes popText{
      0%{opacity:0;transform:translate(-50%,-50%) scale(.6)}
      20%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
      70%{opacity:1;transform:translate(-50%,-50%) scale(1)}
      100%{opacity:0;transform:translate(-50%,-50%) scale(.96)}
    }

    .confetti,.spark,.mini-heart,.intro-particle{
      position:absolute;
      left:50%;
      top:50%;
      pointer-events:none;
      opacity:0;
    }

    .confetti{
      width:12px;
      height:18px;
      border-radius:8px;
      animation:confettiFly var(--dur) ease-out forwards;
      background:linear-gradient(180deg, #fff, #ffd96d);
      box-shadow:0 0 12px rgba(255,255,255,.8);
    }

    @keyframes confettiFly{
      0%{opacity:0;transform:translate(-50%,-50%) scale(.35) rotate(0deg)}
      12%{opacity:1}
      100%{
        opacity:0;
        transform:translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(1.2) rotate(var(--r));
      }
    }

    .spark{
      width:20px;
      height:20px;
      animation:sparkFly var(--dur) ease-out forwards;
    }

    .spark::before,.spark::after,
    .intro-particle.spark::before,.intro-particle.spark::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      border-radius:999px;
      background:linear-gradient(180deg, #fff, #ffd86b);
      box-shadow:0 0 12px rgba(255,255,255,.8);
    }

    .spark::before,.intro-particle.spark::before{width:5px;height:18px}
    .spark::after,.intro-particle.spark::after{width:18px;height:5px}

    @keyframes sparkFly{
      0%{opacity:0;transform:translate(-50%,-50%) scale(.3) rotate(0deg)}
      12%{opacity:1}
      100%{
        opacity:0;
        transform:translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(1.35) rotate(260deg);
      }
    }

    .mini-heart,.intro-particle.heart{
      width:14px;
      height:14px;
      background:linear-gradient(135deg, #ff90b9, #ffc3da);
      transform:translate(-50%,-50%) rotate(45deg);
      border-radius:4px;
      animation:heartRise var(--dur) ease-out forwards;
      filter:drop-shadow(0 0 10px rgba(255,182,210,.75));
    }
    .mini-heart::before,.mini-heart::after,
    .intro-particle.heart::before,.intro-particle.heart::after{
      content:"";
      position:absolute;
      width:14px;height:14px;
      background:inherit;
      border-radius:50%;
    }
    .mini-heart::before,.intro-particle.heart::before{left:-7px;top:0}
    .mini-heart::after,.intro-particle.heart::after{left:0;top:-7px}

    @keyframes heartRise{
      0%{opacity:0;transform:translate(-50%,-50%) rotate(45deg) scale(.3)}
      12%{opacity:1}
      100%{
        opacity:0;
        transform:translate(calc(-50% + var(--x)), calc(-50% + var(--y))) rotate(45deg) scale(1.35);
      }
    }

    .start-overlay{
      position:absolute;
      inset:0;
      z-index:80;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.25), rgba(255,255,255,0) 48%),
        linear-gradient(135deg, rgba(255,246,251,.92), rgba(245,239,255,.9));
      transition:opacity .35s ease, visibility .35s ease;
    }

    .start-overlay.hide{
      opacity:0;
      visibility:hidden;
    }

    .start-card{
      width:min(580px, calc(100% - 28px));
      padding:28px 20px 24px;
      border-radius:34px;
      background:rgba(255,255,255,.88);
      backdrop-filter:blur(12px);
      box-shadow:0 20px 50px rgba(163,120,166,.16);
      text-align:center;
      border:1px solid rgba(255,255,255,.8);
    }

    .start-title{
      font-size:32px;
      font-weight:900;
      color:#6f4d6c;
      margin-bottom:8px;
    }

    .start-text{
      font-size:15px;
      font-weight:800;
      color:#8f7790;
      line-height:1.7;
    }

    .start-btn{
      margin-top:18px;
      min-width:190px;
      height:56px;
      border:none;
      border-radius:999px;
      background:linear-gradient(135deg, #ff9ec8, #c19bff);
      color:#fff;
      font-size:20px;
      font-weight:900;
      box-shadow:0 14px 28px rgba(193,155,255,.28);
      cursor:pointer;
    }

    .start-btn:active{transform:scale(.98)}

    .intro{
      position:absolute;
      inset:0;
      z-index:70;
      pointer-events:none;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      opacity:0;
      visibility:hidden;
    }

    .intro.show{
      opacity:1;
      visibility:visible;
    }

    .intro.hide{
      animation:introFade .32s ease forwards;
    }

    @keyframes introFade{
      to{opacity:0;visibility:hidden}
    }

    .intro-ring{
      position:absolute;
      left:50%;
      top:50%;
      width:26vmin;
      height:26vmin;
      margin-left:-13vmin;
      margin-top:-13vmin;
      border-radius:50%;
      border:4px solid rgba(255,255,255,.72);
      box-shadow:0 0 30px rgba(255,255,255,.8), 0 0 80px rgba(255,177,220,.55);
      opacity:0;
      animation:ringBoom 1.5s ease-out forwards;
    }
    .intro-ring.r2{animation-delay:.16s}
    .intro-ring.r3{animation-delay:.30s}

    @keyframes ringBoom{
      0%{transform:scale(.22);opacity:0}
      20%{opacity:1}
      100%{transform:scale(2.9);opacity:0}
    }

    .rainbow{
      position:absolute;
      left:50%;
      top:54%;
      width:min(132vmin, 1220px);
      height:min(52vmin, 480px);
      transform:translate(-58%, -50%) rotate(-8deg) scale(.55);
      opacity:0;
      filter:blur(.4px) drop-shadow(0 0 24px rgba(255,255,255,.8));
      animation:rainbowIn 2.05s ease forwards;
    }

    .rainbow .band{
      position:absolute;
      left:0; right:0;
      border-radius:999px;
    }
    .rainbow .b1{top:0;height:18%;background:linear-gradient(90deg,#ff8aa8,#ff9fc7)}
    .rainbow .b2{top:18%;height:18%;background:linear-gradient(90deg,#ffb26e,#ffd76a)}
    .rainbow .b3{top:36%;height:18%;background:linear-gradient(90deg,#ffe26d,#fff3a9)}
    .rainbow .b4{top:54%;height:18%;background:linear-gradient(90deg,#95efb5,#73dfb8)}
    .rainbow .b5{top:72%;height:18%;background:linear-gradient(90deg,#8ecfff,#8dacff)}
    .rainbow .b6{top:90%;height:10%;background:linear-gradient(90deg,#c59dff,#f1b8ff)}

    @keyframes rainbowIn{
      0%{transform:translate(-88%, -42%) rotate(-16deg) scale(.34);opacity:0}
      18%{opacity:1}
      46%{transform:translate(-64%, -48%) rotate(-10deg) scale(.84);opacity:1}
      100%{transform:translate(-58%, -50%) rotate(-8deg) scale(1);opacity:.96}
    }

    .unicorn-stage{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .unicorn-wrap{
      width:min(84vmin, 680px);
      aspect-ratio:1/1;
      transform:translate(42vw, 18vh) scale(.22) rotate(-10deg);
      opacity:0;
      filter:
        drop-shadow(0 32px 42px rgba(239,136,190,.20))
        drop-shadow(0 0 26px rgba(255,255,255,.74));
      animation:unicornFly 2.2s cubic-bezier(.2,.9,.2,1) forwards;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    @keyframes unicornFly{
      0%{opacity:0;transform:translate(42vw,18vh) scale(.22) rotate(-10deg)}
      18%{opacity:1;transform:translate(12vw,5vh) scale(.62) rotate(-6deg)}
      44%{opacity:1;transform:translate(0,0) scale(1.08) rotate(0deg)}
      58%{transform:translate(0,-8px) scale(1.02) rotate(0deg)}
      72%{transform:translate(0,4px) scale(1.05) rotate(-1deg)}
      86%{transform:translate(0,-2px) scale(1.03) rotate(1deg)}
      100%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg)}
    }

    .unicorn-photo{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      animation:bodyBob .58s ease-in-out infinite alternate;
    }

    @keyframes bodyBob{from{transform:translateY(0)}to{transform:translateY(-3px)}}

    .intro-particle.spark{
      width:20px;
      height:20px;
      animation:sparkFly var(--dur) ease-out forwards;
    }

    .mega-text{
      position:absolute;
      left:50%;
      top:20%;
      transform:translateX(-50%) scale(.75);
      padding:14px 22px;
      background:rgba(255,255,255,.88);
      border-radius:999px;
      box-shadow:0 14px 30px rgba(170,120,170,.18);
      color:#7a5573;
      font-weight:900;
      font-size:24px;
      opacity:0;
      animation:megaTextIn .95s ease forwards;
      white-space:nowrap;
    }

    @keyframes megaTextIn{
      0%{opacity:0;transform:translateX(-50%) scale(.55)}
      18%{opacity:1;transform:translateX(-50%) scale(1.12)}
      70%{opacity:1;transform:translateX(-50%) scale(1)}
      100%{opacity:0;transform:translateX(-50%) scale(.96)}
    }

    .mega-badge,.mega-bubble,.mega-ribbon,.mega-twinkle{
      position:absolute;
      opacity:0;
      pointer-events:none;
    }

    .mega-badge{
      padding:10px 16px;
      border-radius:999px;
      background:rgba(255,255,255,.88);
      box-shadow:0 10px 24px rgba(170,120,170,.16);
      font-weight:900;
      color:#7d5b79;
      animation:floatBadge var(--dur) ease-out forwards;
      font-size:clamp(14px, 2.4vw, 22px);
    }

    .mega-bubble{
      width:var(--size);
      height:var(--size);
      border-radius:50%;
      background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.95), var(--c1) 45%, var(--c2) 100%);
      box-shadow:0 0 18px rgba(255,255,255,.55);
      animation:floatBubble var(--dur) ease-out forwards;
    }

    .mega-ribbon{
      width:var(--w);
      height:var(--h);
      border-radius:999px;
      background:linear-gradient(90deg, var(--c1), var(--c2));
      transform:translate(-50%,-50%) rotate(var(--rot));
      filter:blur(.2px) drop-shadow(0 8px 14px rgba(0,0,0,.08));
      animation:ribbonFly var(--dur) ease-out forwards;
    }

    .mega-twinkle{
      width:var(--size);
      height:var(--size);
      animation:floatTwinkle var(--dur) ease-out forwards;
    }

    .mega-twinkle::before,
    .mega-twinkle::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      border-radius:999px;
      background:linear-gradient(180deg, #fff, #ffe06c);
      box-shadow:0 0 12px rgba(255,255,255,.8);
    }

    .mega-twinkle::before{width:calc(var(--size) * .22);height:var(--size)}
    .mega-twinkle::after{width:var(--size);height:calc(var(--size) * .22)}

    @keyframes floatBadge{
      0%{opacity:0;transform:translate(-50%,-50%) scale(.35) rotate(-6deg)}
      15%{opacity:1}
      100%{opacity:0;transform:translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(1.2) rotate(var(--r))}
    }

    @keyframes floatBubble{
      0%{opacity:0;transform:translate(-50%,-50%) scale(.25)}
      15%{opacity:.95}
      100%{opacity:0;transform:translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(1.35)}
    }

    @keyframes ribbonFly{
      0%{opacity:0;transform:translate(-50%,-50%) rotate(var(--rot)) scale(.2)}
      15%{opacity:1}
      100%{opacity:0;transform:translate(calc(-50% + var(--x)), calc(-50% + var(--y))) rotate(calc(var(--rot) + var(--r2))) scale(1.2)}
    }

    @keyframes floatTwinkle{
      0%{opacity:0;transform:translate(-50%,-50%) scale(.25) rotate(0)}
      15%{opacity:1}

    function rand(min, max){ return Math.random() * (max - min) + min; }
    function pick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }
    function delay(ms){ return new Promise(resolve => setTimeout(resolve, ms)); }
    function capitalize(s){ return s.replace(/\b\w/g, c => c.toUpperCase()); }

    function shuffle(arr){
      const a = [...arr];
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function makeBgStars(){
      bgStars.innerHTML = '';
      const total = window.innerWidth < 700 ? 28 : 42;
      for(let i=0;i<total;i++){
        const s = document.createElement('div');
        s.className = 'star';
        s.style.left = rand(2,98) + '%';
        s.style.top = rand(3,96) + '%';
        s.style.animationDuration = rand(1.2,2.9) + 's';

        s.style.transform = `scale(${rand(.65,1.5)})`;
        bgStars.appendChild(s);
      }

    function ensureAudio(){
      if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) audioCtx = new AC();
      }
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume().catch(()=>{});
      }
      audioReady = true;
    }

    function playMagicSound(){
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const notes = [523.25, 659.25, 783.99, 1046.5];
      notes.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, now + i * 0.09);
        gain.gain.setValueAtTime(0.0001, now + i * 0.09);
        gain.gain.exponentialRampToValueAtTime(0.08, now + i * 0.09 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + i * 0.09 + 0.38);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now + i * 0.09);
        osc.stop(now + i * 0.09 + 0.42);
      });
    }

    function getVoices(){
      if (!('speechSynthesis' in window)) return [];
      return window.speechSynthesis.getVoices();
    }

    function speak(text, lang='en-US', rate=0.9, pitch=1.1){
      return new Promise(resolve => {
        if (!('speechSynthesis' in window) || !audioReady) {
          resolve();
          return;
        }

        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = lang;
        utter.rate = rate;
        utter.pitch = pitch;

        const voices = getVoices();
        let preferred = null;

        if (lang.startsWith('zh')) {
          preferred =
            voices.find(v => /zh-TW/i.test(v.lang) && /female|mei|hsiao|ting|yu/i.test(v.name)) ||
            voices.find(v => /zh-TW/i.test(v.lang)) ||
            voices.find(v => /zh/i.test(v.lang));
        } else {
          preferred =
            voices.find(v => /^en/i.test(v.lang) && /Samantha|Karen|Tessa|Moira|Ava|Allison/i.test(v.name)) ||
            voices.find(v => /^en/i.test(v.lang));
        }

        if (preferred) utter.voice = preferred;

        utter.onend = () => resolve();
        utter.onerror = () => resolve();
        window.speechSynthesis.speak(utter);
      });
    }

    function cancelQuestionSequence(){
      questionSequenceToken += 1;
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
      }
    }

    async function speakQuestionSequence(){
      if (!currentRound) return;
      cancelQuestionSequence();
      const myToken = questionSequenceToken;

      for (let i = 0; i < 3; i++) {
        if (myToken !== questionSequenceToken) return;
        await speakPromptOnce(currentRound);
        if (i < 2) {
          await delay(2000);
          if (myToken !== questionSequenceToken) return;
        }
      }
    }

    async function speakPromptOnce(round){
      if (round.category === 'numbers') {
        await speak(numberToZh(round.answerValue), 'zh-TW', 0.88, 1.06);
      } else if (round.category === 'letters') {
        await speak(round.answerValue, 'en-US', 0.84, 1.10);
      } else if (round.category === 'bopomofo') {
        // 保持原樣直接念符號
        await speak(bopomofoSpeechMap[round.answerValue] || round.answerValue, 'zh-TW', 0.72, 1.0);
      } else if (round.category === 'animals') {
        await speak(round.answerValue, 'en-US', 0.88, 1.12);
      }
    }

    function updateModeText(){
      const catLabel = categories.find(c => c.key === currentCategory)?.label || '';
      if (currentCategory === 'numbers') {
        modeText.textContent = `${catLabel} · ${currentNumberRange.label}`;
      } else if (currentCategory === 'letters') {
        modeText.textContent = `${catLabel} · ${currentLetterRange.label}`;
      } else if (currentCategory === 'bopomofo') {
        modeText.textContent = `${catLabel} · ${currentBopomofoRange.label}`;
      } else {
        modeText.textContent = catLabel;

      categories.forEach(cat => {

        btn.className = 'small-btn' + (cat.key === currentCategory ? ' active' : '');
        btn.textContent = cat.label;

          currentCategory = cat.key;
          buildCategoryButtons();
          buildRangeButtons();
          updateModeText();
          if (gameStarted) {
            await nextRound();
          }
        });
        categoryButtons.appendChild(btn);

    function getActiveRangeSet(){
      if (currentCategory === 'numbers') return numberRanges;
      if (currentCategory === 'letters') return letterRanges;
      if (currentCategory === 'bopomofo') return bopomofoRanges;
      return [];
    }

    function getCurrentRangeObj(){
      if (currentCategory === 'numbers') return currentNumberRange;
      if (currentCategory === 'letters') return currentLetterRange;
      if (currentCategory === 'bopomofo') return currentBopomofoRange;
      return null;
    }

    function buildRangeButtons(){
      const ranges = getActiveRangeSet();
      rangeButtons.innerHTML = '';

      if (currentCategory === 'numbers') {
        rangeTitle.textContent = '數字範圍';

        rangeTitle.textContent = '英文字母範圍';

        rangeTitle.textContent = '注音範圍';
      } else {
        rangeTitle.textContent = '範圍';
      }

      const shouldShow = currentCategory !== 'animals';
      rangeTitle.style.display = shouldShow ? 'block' : 'none';
      rangeButtons.style.display = shouldShow ? 'grid' : 'none';

      if (!shouldShow) return;

      const currentRange = getCurrentRangeObj();
      ranges.forEach(range => {
        const btn = document.createElement('button');
        const active = currentRange && currentRange.key === range.key;
        btn.className = 'small-btn' + (active ? ' active' : '');
        btn.textContent = range.label;

          if (currentCategory === 'numbers') currentNumberRange = range;
          if (currentCategory === 'letters') currentLetterRange = range;
          if (currentCategory === 'bopomofo') currentBopomofoRange = range;
          buildRangeButtons();
          updateModeText();
          if (gameStarted) {
            await nextRound();
          }

        rangeButtons.appendChild(btn);

    function getNumberPool(){
      return Array.from(
        { length: currentNumberRange.end - currentNumberRange.start + 1 },
        (_,i)=>currentNumberRange.start + i
      );
    }

    function getLetterPool(){
      return letters.slice(currentLetterRange.start, currentLetterRange.end + 1);
    }

    function getBopomofoPool(){
      return bopomofoSymbols.slice(currentBopomofoRange.start, currentBopomofoRange.end + 1);
    }

    function ensureMinPool(pool, fallback){
      return pool.length >= 4 ? pool : fallback;
    }

    function createRound(){
      if (currentCategory === 'numbers') {
        const pool = ensureMinPool(getNumberPool(), Array.from({length:100}, (_,i)=>i+1));
        const correct = pick(pool);
        const wrongPool = pool.filter(n => n !== correct);
        const wrongs = shuffle(wrongPool).slice(0,3);
        return {
          category:'numbers',
          answerValue:correct,
          answerLabel:String(correct),
          answerSub:numberToZh(correct),
          options:shuffle([correct, ...wrongs]).map(v => ({
            value:v,
            label:String(v),
            sub:numberToZh(v),
            type:'symbol'
          }))
        };
      }

      if (currentCategory === 'letters') {
        const basePool = ensureMinPool(getLetterPool(), letters);
        const correct = pick(basePool);
        const wrongs = shuffle(basePool.filter(v => v !== correct)).slice(0,3);
        return {
          category:'letters',
          answerValue:correct,
          answerLabel:correct,
          answerSub:'',
          options:shuffle([correct, ...wrongs]).map(v => ({
            value:v,
            label:v,
            sub:'',
            type:'symbol'
          }))
        };
      }

      if (currentCategory === 'bopomofo') {
        const basePool = ensureMinPool(getBopomofoPool(), bopomofoSymbols);
        const correct = pick(basePool);
        const wrongs = shuffle(basePool.filter(v => v !== correct)).slice(0,3);
        return {
          category:'bopomofo',
          answerValue:correct,
          answerLabel:correct,
          answerSub:'',
          options:shuffle([correct, ...wrongs]).map(v => ({
            value:v,
            label:v,
            sub:'',
            type:'symbol'
          }))
        };
      }

      const correct = pick(animals);
      const wrongs = shuffle(animals.filter(a => a.en !== correct.en)).slice(0,3);
      return {
        category:'animals',
        answerValue:correct.en,
        answerLabel:capitalize(correct.en),
        answerSub:correct.zh,
        options:shuffle([correct, ...wrongs]).map(v => ({
          value:v.en,
          label:capitalize(v.en),
          sub:v.zh,
          type:'animal',
          animal:v
        }))
      };
    }

    function renderRound(round){
      cardsEl.innerHTML = '';

      if (round.category === 'numbers') {
        questionMain.textContent = `找出數字 ${round.answerValue}`;
        questionSub.textContent = '';
      } else if (round.category === 'letters') {
        questionMain.textContent = `${round.answerValue}`;
        questionSub.textContent = '';
      } else if (round.category === 'bopomofo') {
        questionMain.textContent = `找出 ${round.answerValue}`;
        questionSub.textContent = '';
      } else {
        questionMain.textContent = `Find: ${capitalize(round.answerValue)}`;
        questionSub.textContent = '';
      }

      round.options.forEach(option => {
        cardsEl.appendChild(renderCard(option));
      });

      requestAnimationFrame(() => {
        cardsEl.classList.add('ready');
      });
    }

    function renderCard(option){
      const card = document.createElement('button');
      card.className = 'card';
      card.dataset.value = option.value;

      if (option.type === 'symbol') {
        card.innerHTML = `
          <span class="card-glow"></span>
          <div class="card-figure">
            <div class="big-symbol">${option.label}</div>
          </div>
          <div class="card-label">${option.label}</div>
          <div class="card-sub">${option.sub || ''}</div>
          <div class="correct-mark">✓</div>
          <div class="wrong-mark">✕</div>
        `;
      } else {
        const imgUrl = twemojiUrl(option.animal.code);
        const fallback = fallbackAnimalSVG(option.animal);
        card.innerHTML = `
          <span class="card-glow"></span>
          <div class="card-figure">
            <img class="card-img" src="${imgUrl}" alt="${option.label}" loading="eager" decoding="async">
            <div class="fallback-svg">${fallback}</div>
          </div>
          <div class="card-label">${option.label}</div>
          <div class="card-sub">${option.sub}</div>
          <div class="correct-mark">✓</div>
          <div class="wrong-mark">✕</div>
        `;

        const img = card.querySelector('.card-img');
        const fallbackEl = card.querySelector('.fallback-svg');
        img.addEventListener('error', () => {
          img.style.display = 'none';
          fallbackEl.style.display = 'block';
        }, { once:true });

        img.addEventListener('load', () => {
          fallbackEl.style.display = 'none';
        }, { once:true });
      }

      card.addEventListener('click', () => onPick(option, card));
      return card;
    }

    function twemojiUrl(code){
      return `https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${code}.svg`;
    }

    function emojiFromCode(code){
      return code.split('-').map(part => String.fromCodePoint(parseInt(part,16))).join('');
    }

    function fallbackAnimalSVG(item){
      const label = item.en.replace(/\b\w/g, c => c.toUpperCase());
      const bg = item.color || '#ffe9f2';
      const accent = '#7a5773';
      const emoji = emojiFromCode(item.code);
      return `
        <svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="${bg}"/>
              <stop offset="100%" stop-color="#ffffff"/>
            </linearGradient>
          </defs>
          <rect x="10" y="10" width="160" height="160" rx="36" fill="url(#g)" stroke="#f3dceb"/>
          <circle cx="90" cy="88" r="50" fill="rgba(255,255,255,.72)"/>
          <text x="90" y="102" font-size="56" text-anchor="middle">${emoji}</text>
          <text x="90" y="150" font-size="12" font-weight="700" fill="${accent}" text-anchor="middle">${label}</text>
        </svg>
      `;
    }

    function showPop(text){
      messagePop.textContent = text;
      messagePop.classList.remove('show');
      void messagePop.offsetWidth;
      messagePop.classList.add('show');
    }

    function disableAllCards(disabled){
      [...cardsEl.querySelectorAll('.card')].forEach(c => c.disabled = disabled);
    }

    function markCard(card, type){
      const selector = type === 'correct' ? '.correct-mark' : '.wrong-mark';
      const el = card.querySelector(selector);
      el.classList.remove('show-mark');
      void el.offsetWidth;
      el.classList.add('show-mark');
    }

    function celebrateMicro(card){
      confettiLayer.innerHTML = '';
      const total = window.innerWidth < 700 ? 18 : 28;

      for(let i=0;i<total;i++){
        const e = document.createElement('div');
        e.className = 'confetti';
        const angle = rand(0, Math.PI * 2);
        const dist = rand(90, window.innerWidth < 700 ? 200 : 320);
        e.style.setProperty('--x', `${Math.cos(angle) * dist}px`);
        e.style.setProperty('--y', `${Math.sin(angle) * dist}px`);
        e.style.setProperty('--r', `${rand(180, 520)}deg`);
        e.style.setProperty('--dur', `${rand(1.1, 1.9)}s`);
        e.style.background = pick([
          'linear-gradient(180deg,#fff,#ffd96d)',
          'linear-gradient(180deg,#fff,#ff97be)',
          'linear-gradient(180deg,#fff,#9ac7ff)',
          'linear-gradient(180deg,#fff,#bfa0ff)',
          'linear-gradient(180deg,#fff,#8fdfb7)'
        ]);
        confettiLayer.appendChild(e);
      }

      for(let i=0;i<10;i++){
        const h = document.createElement('div');
        h.className = 'mini-heart';
        h.style.setProperty('--x', `${rand(-220, 220)}px`);
        h.style.setProperty('--y', `${rand(-220, -70)}px`);
        h.style.setProperty('--dur', `${rand(1.1, 1.8)}s`);
        confettiLayer.appendChild(h);
      }

      burstAtCard(card);
      setTimeout(() => confettiLayer.innerHTML = '', 1900);
    }

    function burstAtCard(card){
      const rect = card.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      fxLayer.innerHTML = '';

      for(let i=0;i<16;i++){
        const s = document.createElement('div');
        s.className = 'spark';
        const angle = rand(0, Math.PI * 2);
        const dist = rand(40, 130);
        s.style.left = `${cx}px`;
        s.style.top = `${cy}px`;
        s.style.setProperty('--x', `${Math.cos(angle) * dist}px`);
        s.style.setProperty('--y', `${Math.sin(angle) * dist}px`);
        s.style.setProperty('--dur', `${rand(.8, 1.3)}s`);
        fxLayer.appendChild(s);
      }

      setTimeout(() => fxLayer.innerHTML = '', 1400);
    }

    function createCelebrationProfile(){
      celebrateSeedCounter += 1;
      const paletteA = bubblePalettes[celebrateSeedCounter % bubblePalettes.length];
      const paletteB = ribbonPalettes[(celebrateSeedCounter * 3) % ribbonPalettes.length];
      const praise = praisePool[celebrateSeedCounter % praisePool.length];

      return {
        praise,
        badgeCount: 3 + (celebrateSeedCounter % 4),
        bubbleCount: 12 + (celebrateSeedCounter % 9),
        ribbonCount: 9 + (celebrateSeedCounter % 8),
        twinkleCount: 10 + (celebrateSeedCounter % 10),
        paletteA,
        paletteB,
        withTopText: celebrateSeedCounter % 2 === 0,
        withSideBadges: celebrateSeedCounter % 3 !== 0,
        withCenterSparkBurst: celebrateSeedCounter % 4 !== 1
      };
    }

    function playMegaCelebrate(){
      const profile = createCelebrationProfile();
      megaCelebrateLayer.innerHTML = '';

      if (profile.withTopText) {
        const text = document.createElement('div');
        text.className = 'mega-text';
        text.textContent = profile.praise;
        megaCelebrateLayer.appendChild(text);
      }

      if (profile.withSideBadges) {
        for (let i = 0; i < profile.badgeCount; i++) {
          const badge = document.createElement('div');
          badge.className = 'mega-badge';
          badge.textContent = badgePool[(celebrateSeedCounter + i * 5) % badgePool.length];
          badge.style.left = rand(16, 84) + '%';
          badge.style.top = rand(18, 72) + '%';
          badge.style.setProperty('--x', rand(-120, 120) + 'px');
          badge.style.setProperty('--y', rand(-100, 120) + 'px');
          badge.style.setProperty('--r', rand(-80, 80) + 'deg');
          badge.style.setProperty('--dur', rand(1.7, 2.6) + 's');
          megaCelebrateLayer.appendChild(badge);
        }
      }

      for (let i = 0; i < profile.bubbleCount; i++) {
        const b = document.createElement('div');
        b.className = 'mega-bubble';
        const p = i % 2 === 0 ? profile.paletteA : bubblePalettes[(celebrateSeedCounter + i) % bubblePalettes.length];
        b.style.left = rand(10, 90) + '%';
        b.style.top = rand(14, 86) + '%';
        b.style.setProperty('--x', rand(-160, 160) + 'px');
        b.style.setProperty('--y', rand(-200, 120) + 'px');
        b.style.setProperty('--dur', rand(1.4, 2.8) + 's');
        b.style.setProperty('--size', rand(14, 54) + 'px');
        b.style.setProperty('--c1', p[0]);
        b.style.setProperty('--c2', p[1]);
        megaCelebrateLayer.appendChild(b);
      }

      for (let i = 0; i < profile.ribbonCount; i++) {
        const r = document.createElement('div');
        r.className = 'mega-ribbon';
        const p = i % 2 === 0 ? profile.paletteB : ribbonPalettes[(celebrateSeedCounter + i) % ribbonPalettes.length];
        r.style.left = rand(10, 90) + '%';
        r.style.top = rand(18, 84) + '%';
        r.style.setProperty('--x', rand(-160, 160) + 'px');
        r.style.setProperty('--y', rand(-140, 140) + 'px');
        r.style.setProperty('--dur', rand(1.3, 2.5) + 's');
        r.style.setProperty('--w', rand(40, 120) + 'px');
        r.style.setProperty('--h', rand(8, 18) + 'px');
        r.style.setProperty('--rot', rand(-180, 180) + 'deg');
        r.style.setProperty('--r2', rand(60, 320) + 'deg');
        r.style.setProperty('--c1', p[0]);
        r.style.setProperty('--c2', p[1]);
        megaCelebrateLayer.appendChild(r);
      }

      for (let i = 0; i < profile.twinkleCount; i++) {
        const t = document.createElement('div');
        t.className = 'mega-twinkle';
        t.style.left = rand(8, 92) + '%';
        t.style.top = rand(12, 86) + '%';
        t.style.setProperty('--x', rand(-120, 120) + 'px');
        t.style.setProperty('--y', rand(-140, 120) + 'px');
        t.style.setProperty('--dur', rand(1.1, 2.2) + 's');
        t.style.setProperty('--size', rand(12, 30) + 'px');
        megaCelebrateLayer.appendChild(t);
      }

      if (profile.withCenterSparkBurst) {
        for (let i = 0; i < 16; i++) {
          const s = document.createElement('div');
          s.className = 'intro-particle spark';
          const angle = rand(0, Math.PI * 2);
          const dist = rand(90, window.innerWidth < 700 ? 200 : 320);
          s.style.left = '50%';
          s.style.top = '50%';
          s.style.setProperty('--x', `${Math.cos(angle) * dist}px`);
          s.style.setProperty('--y', `${Math.sin(angle) * dist}px`);
          s.style.setProperty('--dur', `${rand(1.0, 1.8)}s`);
          megaCelebrateLayer.appendChild(s);
        }
      }

      setTimeout(() => {
        megaCelebrateLayer.innerHTML = '';
      }, 2900);
    }

    function playIntro(){
      intro.classList.remove('hide');
      intro.classList.add('show');
      introParticles.innerHTML = '';
      playMagicSound();

      const sparkCount = window.innerWidth < 700 ? 24 : 40;
      const heartCount = window.innerWidth < 700 ? 8 : 14;

      for(let i=0;i<sparkCount;i++){
        const e = document.createElement('div');
        e.className = 'intro-particle spark';
        const angle = rand(0, Math.PI * 2);
        const dist = rand(110, window.innerWidth < 700 ? 220 : 340);
        e.style.setProperty('--x', `${Math.cos(angle) * dist}px`);
        e.style.setProperty('--y', `${Math.sin(angle) * dist}px`);
        e.style.setProperty('--dur', `${rand(1.0, 1.7)}s`);
        e.style.animationDelay = `${rand(.03, .3)}s`;
        introParticles.appendChild(e);
      }

      for(let i=0;i<heartCount;i++){
        const h = document.createElement('div');
        h.className = 'intro-particle heart';
        h.style.setProperty('--x', `${rand(-220, 220)}px`);
        h.style.setProperty('--y', `${rand(-240, -80)}px`);
        h.style.setProperty('--dur', `${rand(1.15, 1.95)}s`);
        h.style.animationDelay = `${rand(.1, .5)}s`;
        introParticles.appendChild(h);
      }

      setTimeout(() => {
        intro.classList.add('hide');
        setTimeout(() => {
          intro.classList.remove('show');
          introParticles.innerHTML = '';
        }, 340);
      }, 2300);
    }

    async function nextRound(){
      cancelQuestionSequence();
      isBusy = true;
      cardsEl.classList.remove('ready');

      currentRound = createRound();
      renderRound(currentRound);
      updateModeText();

      await delay(150);
      disableAllCards(false);
      isBusy = false;
      await speakQuestionSequence();
    }

    async function onPick(option, card){
      if (!gameStarted || isBusy || !currentRound) return;
      isBusy = true;
      cancelQuestionSequence();
      disableAllCards(true);

      if (option.value === currentRound.answerValue) {
        score += 1;
        scoreText.textContent = score;
        markCard(card, 'correct');
        celebrateMicro(card);
        playMegaCelebrate();
        showPop('做得很好');

        await speak('做得很好，請繼續下一題', 'zh-TW', 0.92, 1.08);
        playIntro();
        await delay(2500);
        await nextRound();
      } else {
        markCard(card, 'wrong');
        showPop('再試一次');
        await speak('繼續努力', 'zh-TW', 0.92, 1.04);
        await delay(1000);
        disableAllCards(false);
        isBusy = false;
        await speakQuestionSequence();
      }
    }

    async function startGame(){
      ensureAudio();
      gameStarted = true;
      startOverlay.classList.add('hide');
      score = 0;
      scoreText.textContent = score;
      await nextRound();
    }

    function numberToZh(num){
      const d = ['零','一','二','三','四','五','六','七','八','九'];
      if (num <= 10) return num === 10 ? '十' : d[num];
      if (num < 20) return '十' + d[num % 10];
      if (num % 10 === 0) return d[Math.floor(num / 10)] + '十';
      return d[Math.floor(num / 10)] + '十' + d[num % 10];
    }

    parentHead.addEventListener('click', () => {
      parentPanel.classList.toggle('open');
      parentArrow.textContent = parentPanel.classList.contains('open') ? '▲' : '▼';
    });

    speakBtn.addEventListener('click', async () => {
      ensureAudio();
      if (!gameStarted || isBusy || !currentRound) return;
      await speakQuestionSequence();
    });

    nextBtn.addEventListener('click', async () => {
      ensureAudio();
      if (!gameStarted || isBusy) return;
      await nextRound();
    });

    magicBtn.addEventListener('click', () => {
      ensureAudio();
      playIntro();
    });

    resetScoreBtn.addEventListener('click', () => {
      score = 0;
      scoreText.textContent = score;
      showPop('分數已歸零');
    });

    startBtn.addEventListener('click', startGame);

    window.addEventListener('pointerdown', () => {
      ensureAudio();
      if ('speechSynthesis' in window) window.speechSynthesis.getVoices();
    }, { once:true });

    if ('speechSynthesis' in window) {
      window.speechSynthesis.onvoiceschanged = () => {
        window.speechSynthesis.getVoices();
      };
    }

    window.addEventListener('resize', makeBgStars);

    buildCategoryButtons();
    buildRangeButtons();
    updateModeText();
    makeBgStars();
  </script>
</body>
</html>
