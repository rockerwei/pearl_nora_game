<!DOCTYPE html>
<html lang="zh-Hant">
<body>
  <button id="a">唸 A</button>
  <button id="b">唸 ㄅ</button>
  <button id="c">唸 1</button>

  <script>
    function speak(text, lang) {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = lang;
      u.volume = 1;
      u.rate = 0.5;
      u.pitch = 1.1;
      speechSynthesis.speak(u);
    }

    document.getElementById("a").onclick = () => speak("a", "en-US");
    document.getElementById("b").onclick = () => speak("玻", "zh-TW");
    document.getElementById("c").onclick = () => speak("一", "zh-TW");
  </script>
</body>
</html>
