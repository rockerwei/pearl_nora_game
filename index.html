<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Unicorn Fullscreen Intro</title>
  <style>
    :root{
      --bg1:#fff4fb;
      --bg2:#f8f2ff;
      --bg3:#fff8ef;
      --pink:#ff7eb6;
      --pink2:#ff9ec7;
      --pink3:#ffd2e6;
      --purple:#b98cff;
      --purple2:#8f6cff;
      --gold:#ffc84d;
      --white:#ffffff;
      --ink:#6d4a6d;
      --card:#ffffffd9;
      --shadow:0 18px 44px rgba(173, 112, 168, .20);
      --radius:28px;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
      background:
        radial-gradient(circle at 20% 20%, #ffffff 0%, rgba(255,255,255,.8) 12%, transparent 28%),
        radial-gradient(circle at 80% 25%, #fff6d6 0%, rgba(255,246,214,.9) 10%, transparent 22%),
        radial-gradient(circle at 25% 78%, #ffe1f0 0%, rgba(255,225,240,.7) 16%, transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 45%, var(--bg3));
      color:#5c4661;
    }

    .app{
      position:relative;
      width:100%;
      height:100%;
      overflow:hidden;
      isolation:isolate;
    }

    /* 背景夢幻層 */
    .dream-bg{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:0;
    }

    .orb{
      position:absolute;
      border-radius:999px;
      filter:blur(10px);
      opacity:.45;
      animation: floatSlow linear infinite;
    }

    .orb.o1{
      width:240px;height:240px;
      left:-40px;top:8%;
      background:radial-gradient(circle, rgba(255,182,213,.95), rgba(255,182,213,0));
      animation-duration:13s;
    }
    .orb.o2{
      width:280px;height:280px;
      right:-60px;top:10%;
      background:radial-gradient(circle, rgba(198,176,255,.95), rgba(198,176,255,0));
      animation-duration:16s;
    }
    .orb.o3{
      width:260px;height:260px;
      left:20%;bottom:-60px;
      background:radial-gradient(circle, rgba(255,235,173,.88), rgba(255,235,173,0));
      animation-duration:18s;
    }

    @keyframes floatSlow{
      0%{transform:translateY(0) translateX(0) scale(1)}
      50%{transform:translateY(-20px) translateX(10px) scale(1.05)}
      100%{transform:translateY(0) translateX(0) scale(1)}
    }

    .stars{
      position:absolute; inset:0;
      overflow:hidden;
      pointer-events:none;
    }

    .star{
      position:absolute;
      width:10px;
      height:10px;
      background:radial-gradient(circle, rgba(255,255,255,1) 0 30%, rgba(255,221,120,.95) 31% 56%, rgba(255,255,255,0) 57%);
      filter:drop-shadow(0 0 12px rgba(255,255,255,.95));
      animation: twinkle ease-in-out infinite;
      opacity:.9;
      border-radius:50%;
    }

    @keyframes twinkle{
      0%,100%{transform:scale(.5);opacity:.35}
      50%{transform:scale(1.55);opacity:1}
    }

    /* 主內容 */
    .content{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-end;
      padding:24px 18px max(24px, env(safe-area-inset-bottom));
      z-index:1;
    }

    .cards-wrap{
      width:min(980px, 100%);
      transform:translateY(24px);
      opacity:0;
      transition:
        opacity .18s ease,
        transform .18s ease;
      will-change:transform,opacity;
    }

    .cards-wrap.ready{
      opacity:1;
      transform:translateY(0);
    }

    .card-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:14px;
    }

    .card{
      position:relative;
      min-height:170px;
      border:none;
      border-radius:var(--radius);
      background:linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,255,255,.85));
      box-shadow:var(--shadow);
      overflow:hidden;
      cursor:pointer;
      padding:14px;
      transition:transform .12s ease, box-shadow .12s ease;
    }

    .card:active{
      transform:scale(.98);
    }

    .card::before{
      content:"";
      position:absolute;
      inset:-2px;
      border-radius:inherit;
      padding:2px;
      background:linear-gradient(135deg, rgba(255,174,210,.9), rgba(188,146,255,.9), rgba(255,220,135,.85));
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite:xor;
      mask-composite:exclude;
      pointer-events:none;
    }

    .card .glow{
      position:absolute;
      width:120px;
      height:120px;
      border-radius:999px;
      top:-30px;
      right:-20px;
      background:radial-gradient(circle, rgba(255,191,219,.55), rgba(255,191,219,0));
      pointer-events:none;
    }

    .card-svg{
      width:100%;
      height:112px;
      display:block;
    }

    .card-label{
      margin-top:6px;
      text-align:center;
      font-size:18px;
      font-weight:800;
      letter-spacing:.5px;
      color:#7b5877;
    }

    .hint{
      margin-top:14px;
      text-align:center;
      font-size:14px;
      color:#8f7c93;
      text-shadow:0 1px 0 rgba(255,255,255,.8);
      user-select:none;
    }

    /* 獨角獸滿版動畫層 */
    .intro{
      position:absolute;
      inset:0;
      z-index:5;
      pointer-events:none;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.10), rgba(255,255,255,0) 45%),
        linear-gradient(135deg, rgba(255,245,250,.45), rgba(247,240,255,.25));
    }

    .intro.hide{
      animation:introFadeOut .35s ease forwards;
    }

    @keyframes introFadeOut{
      to{opacity:0;visibility:hidden}
    }

    .intro-burst{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .burst-ring{
      position:absolute;
      left:50%;
      top:50%;
      width:28vmin;
      height:28vmin;
      margin-left:-14vmin;
      margin-top:-14vmin;
      border-radius:50%;
      border:4px solid rgba(255,255,255,.65);
      box-shadow:
        0 0 30px rgba(255,255,255,.8),
        0 0 80px rgba(255,175,223,.5);
      animation:ringBoom 1.6s ease-out forwards;
      opacity:0;
    }

    .burst-ring.r2{animation-delay:.18s}
    .burst-ring.r3{animation-delay:.32s}

    @keyframes ringBoom{
      0%{transform:scale(.2);opacity:0}
      18%{opacity:1}
      100%{transform:scale(2.7);opacity:0}
    }

    .rainbow{
      position:absolute;
      left:50%;
      top:54%;
      width:min(130vmin, 1200px);
      height:min(52vmin, 480px);
      transform:translate(-58%, -50%) rotate(-8deg) scale(.6);
      opacity:0;
      filter:blur(.4px) drop-shadow(0 0 24px rgba(255,255,255,.75));
      animation:rainbowIn 2.1s ease forwards;
    }

    @keyframes rainbowIn{
      0%{transform:translate(-88%, -42%) rotate(-16deg) scale(.35);opacity:0}
      18%{opacity:1}
      46%{transform:translate(-64%, -48%) rotate(-10deg) scale(.86);opacity:1}
      100%{transform:translate(-58%, -50%) rotate(-8deg) scale(1);opacity:.95}
    }

    .rainbow .band{
      position:absolute;
      left:0;
      right:0;
      border-radius:999px;
      transform-origin:left center;
      filter:saturate(1.08);
    }

    .band.b1{top:0;height:18%;background:linear-gradient(90deg,#ff8aad,#ff9acb)}
    .band.b2{top:18%;height:18%;background:linear-gradient(90deg,#ffb56b,#ffd971)}
    .band.b3{top:36%;height:18%;background:linear-gradient(90deg,#ffe067,#fff1a8)}
    .band.b4{top:54%;height:18%;background:linear-gradient(90deg,#9df2b5,#73e3b7)}
    .band.b5{top:72%;height:18%;background:linear-gradient(90deg,#8fceff,#8fb0ff)}
    .band.b6{top:90%;height:10%;background:linear-gradient(90deg,#c59cff,#f3b6ff)}

    .sparkles{
      position:absolute; inset:0;
      pointer-events:none;
    }

    .spark{
      position:absolute;
      width:18px;
      height:18px;
      animation:sparkFly var(--dur) ease-out forwards;
      opacity:0;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
    }

    .spark::before,
    .spark::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,221,109,.92));
      border-radius:999px;
      box-shadow:0 0 12px rgba(255,255,255,.8);
    }

    .spark::before{width:5px;height:18px}
    .spark::after{width:18px;height:5px}

    @keyframes sparkFly{
      0%{
        opacity:0;
        transform:translate(-50%,-50%) rotate(0deg) scale(.2);
      }
      12%{opacity:1}
      100%{
        opacity:0;
        transform:
          translate(calc(-50% + var(--x)), calc(-50% + var(--y)))
          rotate(240deg)
          scale(1.4);
      }
    }

    .hearts{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .heart{
      position:absolute;
      left:50%;
      top:56%;
      width:16px;
      height:16px;
      background:linear-gradient(135deg, #ff8fb7, #ffc2d8);
      transform:translate(-50%,-50%) rotate(45deg);
      border-radius:4px;
      opacity:0;
      filter:drop-shadow(0 0 10px rgba(255,179,208,.7));
      animation:heartRise var(--dur) ease-out forwards;
    }

    .heart::before,
    .heart::after{
      content:"";
      position:absolute;
      width:16px;height:16px;
      border-radius:50%;
      background:inherit;
    }
    .heart::before{left:-8px;top:0}
    .heart::after{left:0;top:-8px}

    @keyframes heartRise{
      0%{
        opacity:0;
        transform:translate(-50%,-50%) rotate(45deg) scale(.3);
      }
      12%{opacity:.95}
      100%{
        opacity:0;
        transform:
          translate(calc(-50% + var(--x)), calc(-50% + var(--y)))
          rotate(45deg)
          scale(1.45);
      }
    }

    .unicorn-stage{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
    }

    .unicorn-wrap{
      width:min(78vmin, 720px);
      aspect-ratio:1 / 1;
      transform:translate(42vw, 18vh) scale(.24) rotate(-10deg);
      opacity:0;
      filter:
        drop-shadow(0 32px 40px rgba(239,136,190,.22))
        drop-shadow(0 0 26px rgba(255,255,255,.72));
      animation:unicornFly 2.3s cubic-bezier(.2,.9,.2,1) forwards;
    }

    @keyframes unicornFly{
      0%{
        opacity:0;
        transform:translate(42vw, 18vh) scale(.24) rotate(-10deg);
      }
      18%{
        opacity:1;
        transform:translate(12vw, 5vh) scale(.62) rotate(-6deg);
      }
      44%{
        opacity:1;
        transform:translate(0, 0) scale(1.08) rotate(0deg);
      }
      58%{
        transform:translate(0,-8px) scale(1.02) rotate(0deg);
      }
      72%{
        transform:translate(0,4px) scale(1.05) rotate(-1deg);
      }
      86%{
        transform:translate(0,-2px) scale(1.03) rotate(1deg);
      }
      100%{
        opacity:1;
        transform:translate(0,0) scale(1) rotate(0deg);
      }
    }

    .unicorn-svg{
      width:100%;
      height:100%;
      display:block;
      overflow:visible;
    }

    .mane-wave{
      transform-origin:54% 34%;
      animation:maneWave .7s ease-in-out infinite alternate;
    }

    .tail-wave{
      transform-origin:76% 62%;
      animation:tailWave .48s ease-in-out infinite alternate;
    }

    .body-bob{
      transform-origin:center;
      animation:bodyBob .58s ease-in-out infinite alternate;
    }

    .eye-blink{
      transform-origin:center;
      animation:blink 4s infinite;
    }

    .wing-glow{
      animation:wingGlow .8s ease-in-out infinite alternate;
    }

    @keyframes tailWave{
      from{transform:rotate(-3deg)}
      to{transform:rotate(4deg)}
    }

    @keyframes maneWave{
      from{transform:rotate(-2deg) translateY(0)}
      to{transform:rotate(2deg) translateY(1px)}
    }

    @keyframes bodyBob{
      from{transform:translateY(0)}
      to{transform:translateY(-3px)}
    }

    @keyframes blink{
      0%,46%,48%,100%{transform:scaleY(1)}
      47%{transform:scaleY(.08)}
    }

    @keyframes wingGlow{
      from{opacity:.55}
      to{opacity:1}
    }

    .tap-bar{
      position:absolute;
      top:max(16px, env(safe-area-inset-top));
      left:50%;
      transform:translateX(-50%);
      z-index:6;
      padding:10px 16px;
      border-radius:999px;
      background:rgba(255,255,255,.65);
      backdrop-filter:blur(8px);
      color:#7a5a77;
      font-weight:800;
      font-size:14px;
      box-shadow:0 10px 26px rgba(150,107,155,.14);
      border:1px solid rgba(255,255,255,.7);
      user-select:none;
    }

    .result-pop{
      position:absolute;
      left:50%;
      top:48%;
      transform:translate(-50%, -50%) scale(.8);
      padding:16px 22px;
      border-radius:999px;
      background:rgba(255,255,255,.9);
      box-shadow:0 16px 40px rgba(165,116,165,.20);
      color:#7a5875;
      font-size:24px;
      font-weight:900;
      opacity:0;
      pointer-events:none;
      z-index:7;
    }

    .result-pop.show{
      animation:popIn .7s ease;
    }

    @keyframes popIn{
      0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}
      18%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
      70%{opacity:1;transform:translate(-50%,-50%) scale(1)}
      100%{opacity:0;transform:translate(-50%,-50%) scale(.96)}
    }

    @media (max-width: 820px){
      .unicorn-wrap{width:min(92vmin, 620px)}
      .card{min-height:155px}
      .card-label{font-size:17px}
    }

    @media (max-width: 560px){
      .card-grid{gap:12px}
      .card{min-height:148px; padding:12px}
      .card-svg{height:102px}
      .hint{font-size:13px}
      .tap-bar{font-size:13px;padding:9px 14px}
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="dream-bg">
      <div class="orb o1"></div>
      <div class="orb o2"></div>
      <div class="orb o3"></div>
      <div class="stars" id="bgStars"></div>
    </div>

    <div class="tap-bar">Tap anywhere to replay unicorn magic</div>

    <main class="content">
      <div class="cards-wrap" id="cardsWrap">
        <div class="card-grid">
          <button class="card" data-name="Puppy">
            <span class="glow"></span>
            <svg class="card-svg" viewBox="0 0 180 120" aria-hidden="true">
              <ellipse cx="92" cy="103" rx="48" ry="8" fill="#ffe6ef"/>
              <g transform="translate(14,6)">
                <circle cx="69" cy="52" r="25" fill="#fffaf3" stroke="#8b5e73" stroke-width="5"/>
                <ellipse cx="51" cy="41" rx="11" ry="16" fill="#c98f6b" stroke="#8b5e73" stroke-width="5"/>
                <ellipse cx="87" cy="41" rx="11" ry="16" fill="#c98f6b" stroke="#8b5e73" stroke-width="5"/>
                <rect x="47" y="64" width="46" height="26" rx="12" fill="#fffaf3" stroke="#8b5e73" stroke-width="5"/>
                <circle cx="61" cy="52" r="3.4" fill="#55384a"/>
                <circle cx="77" cy="52" r="3.4" fill="#55384a"/>
                <ellipse cx="69" cy="60" rx="6" ry="4.2" fill="#ffb7c9"/>
                <rect x="48" y="82" width="8" height="18" rx="4" fill="#fffaf3" stroke="#8b5e73" stroke-width="5"/>
                <rect x="82" y="82" width="8" height="18" rx="4" fill="#fffaf3" stroke="#8b5e73" stroke-width="5"/>
                <path d="M94 74 q18 4 18 20" fill="none" stroke="#8b5e73" stroke-width="5" stroke-linecap="round"/>
              </g>
            </svg>
            <div class="card-label">Puppy</div>
          </button>

          <button class="card" data-name="Kitten">
            <span class="glow"></span>
            <svg class="card-svg" viewBox="0 0 180 120" aria-hidden="true">
              <ellipse cx="92" cy="103" rx="48" ry="8" fill="#ece5ff"/>
              <g transform="translate(14,5)">
                <circle cx="70" cy="49" r="24" fill="#fff" stroke="#7d65a6" stroke-width="5"/>
                <path d="M50 35 L60 18 L66 36 Z" fill="#ffd6ea" stroke="#7d65a6" stroke-width="5"/>
                <path d="M74 36 L82 18 L92 35 Z" fill="#ffd6ea" stroke="#7d65a6" stroke-width="5"/>
                <rect x="49" y="64" width="44" height="24" rx="12" fill="#fff" stroke="#7d65a6" stroke-width="5"/>
                <circle cx="62" cy="50" r="3.4" fill="#4e406d"/>
                <circle cx="78" cy="50" r="3.4" fill="#4e406d"/>
                <path d="M66 60 q4 4 8 0" fill="none" stroke="#ff9cbe" stroke-width="4" stroke-linecap="round"/>
                <path d="M56 59 h-11 M56 63 h-12 M82 59 h11 M82 63 h12" stroke="#7d65a6" stroke-width="3" stroke-linecap="round"/>
                <rect x="51" y="81" width="8" height="18" rx="4" fill="#fff" stroke="#7d65a6" stroke-width="5"/>
                <rect x="83" y="81" width="8" height="18" rx="4" fill="#fff" stroke="#7d65a6" stroke-width="5"/>
                <path d="M94 74 q16 0 17 16" fill="none" stroke="#7d65a6" stroke-width="5" stroke-linecap="round"/>
              </g>
            </svg>
            <div class="card-label">Kitten</div>
          </button>

          <button class="card" data-name="Bunny">
            <span class="glow"></span>
            <svg class="card-svg" viewBox="0 0 180 120" aria-hidden="true">
              <ellipse cx="92" cy="103" rx="48" ry="8" fill="#ffe5f5"/>
              <g transform="translate(14,2)">
                <ellipse cx="60" cy="31" rx="9" ry="22" fill="#fff" stroke="#956281" stroke-width="5"/>
                <ellipse cx="79" cy="31" rx="9" ry="22" fill="#fff" stroke="#956281" stroke-width="5"/>
                <ellipse cx="60" cy="33" rx="4" ry="13" fill="#ffd0e5"/>
                <ellipse cx="79" cy="33" rx="4" ry="13" fill="#ffd0e5"/>
                <circle cx="69" cy="53" r="23" fill="#fff" stroke="#956281" stroke-width="5"/>
                <rect x="49" y="69" width="42" height="22" rx="11" fill="#fff" stroke="#956281" stroke-width="5"/>
                <circle cx="61" cy="53" r="3.4" fill="#573d51"/>
                <circle cx="77" cy="53" r="3.4" fill="#573d51"/>
                <ellipse cx="69" cy="61" rx="5" ry="3.8" fill="#ffb1cd"/>
                <circle cx="96" cy="79" r="6" fill="#fff" stroke="#956281" stroke-width="5"/>
              </g>
            </svg>
            <div class="card-label">Bunny</div>
          </button>

          <button class="card" data-name="Unicorn">
            <span class="glow"></span>
            <svg class="card-svg" viewBox="0 0 180 120" aria-hidden="true">
              <ellipse cx="92" cy="103" rx="48" ry="8" fill="#ffeaf5"/>
              <g transform="translate(14,6)">
                <path d="M52 37 L60 20 L68 38 Z" fill="#ffcb55" stroke="#7a4e72" stroke-width="5" stroke-linejoin="round"/>
                <circle cx="65" cy="48" r="22" fill="#fff" stroke="#7a4e72" stroke-width="5"/>
                <path d="M77 41 q16 8 14 23 q-1 7-8 13 q-6-9-6-36Z" fill="#ff9fc5" stroke="#7a4e72" stroke-width="5" stroke-linejoin="round"/>
                <rect x="48" y="67" width="46" height="22" rx="11" fill="#fff" stroke="#7a4e72" stroke-width="5"/>
                <path d="M93 70 q18 5 18 20" fill="none" stroke="#7a4e72" stroke-width="5" stroke-linecap="round"/>
                <path d="M111 88 q7 2 10 8 q-6 3-12-2" fill="#ff9fc5" stroke="#7a4e72" stroke-width="5" stroke-linejoin="round"/>
                <circle cx="61" cy="50" r="3.5" fill="#473546"/>
                <circle cx="68" cy="58" r="2.8" fill="#ffb2cf"/>
                <rect x="52" y="83" width="8" height="17" rx="4" fill="#fff" stroke="#7a4e72" stroke-width="5"/>
                <rect x="84" y="83" width="8" height="17" rx="4" fill="#fff" stroke="#7a4e72" stroke-width="5"/>
              </g>
            </svg>
            <div class="card-label">Unicorn</div>
          </button>
        </div>
        <div class="hint">動畫結束就直接可選，不會再多等一段</div>
      </div>
    </main>

    <div class="intro" id="intro">
      <div class="intro-burst">
        <div class="burst-ring"></div>
        <div class="burst-ring r2"></div>
        <div class="burst-ring r3"></div>
      </div>

      <div class="rainbow" aria-hidden="true">
        <div class="band b1"></div>
        <div class="band b2"></div>
        <div class="band b3"></div>
        <div class="band b4"></div>
        <div class="band b5"></div>
        <div class="band b6"></div>
      </div>

      <div class="sparkles" id="sparkles"></div>
      <div class="hearts" id="hearts"></div>

      <div class="unicorn-stage">
        <div class="unicorn-wrap">
          <svg class="unicorn-svg" viewBox="0 0 700 700" aria-hidden="true">
            <defs>
              <radialGradient id="gGlow" cx="50%" cy="50%" r="60%">
                <stop offset="0%" stop-color="#fff9ff" stop-opacity="1"/>
                <stop offset="60%" stop-color="#ffd8ed" stop-opacity=".8"/>
                <stop offset="100%" stop-color="#ffd8ed" stop-opacity="0"/>
              </radialGradient>
              <linearGradient id="gMane" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ffb1d0"/>

  <script>
    const intro = document.getElementById('intro');
    const cardsWrap = document.getElementById('cardsWrap');
    const sparkles = document.getElementById('sparkles');
    const hearts = document.getElementById('hearts');
    const bgStars = document.getElementById('bgStars');
    const resultPop = document.getElementById('resultPop');
    const cards = Array.from(document.querySelectorAll('.card'));

    let audioReady = false;
    let introTimer = null;

    function rand(min, max){
      return Math.random() * (max - min) + min;
    }

    function makeBgStars(){
      bgStars.innerHTML = '';
      const total = window.innerWidth < 600 ? 28 : 42;
      for(let i=0;i<total;i++){
        const s = document.createElement('div');
        s.className = 'star';
        s.style.left = rand(2, 98) + '%';
        s.style.top = rand(2, 95) + '%';
        s.style.animationDuration = rand(1.2, 2.8) + 's';
        s.style.animationDelay = rand(0, 2) + 's';
        s.style.transform = `scale(${rand(.6, 1.5)})`;
        bgStars.appendChild(s);
      }
    }

    function makeBurstParticles(){
      sparkles.innerHTML = '';
      hearts.innerHTML = '';

      const sparkCount = window.innerWidth < 600 ? 26 : 40;
      const heartCount = window.innerWidth < 600 ? 10 : 16;

      for(let i=0;i<sparkCount;i++){
        const e = document.createElement('div');
        e.className = 'spark';
        const angle = rand(0, Math.PI * 2);
        const dist = rand(110, window.innerWidth < 600 ? 220 : 340);
        const x = Math.cos(angle) * dist + 'px';
        const y = Math.sin(angle) * dist + 'px';
        e.style.setProperty('--x', x);
        e.style.setProperty('--y', y);
        e.style.setProperty('--dur', rand(1.05, 1.85) + 's');
        e.style.animationDelay = rand(.04, .35) + 's';
        sparkles.appendChild(e);
      }

      for(let i=0;i<heartCount;i++){
        const h = document.createElement('div');
        h.className = 'heart';
        h.style.setProperty('--x', rand(-220, 220) + 'px');
        h.style.setProperty('--y', rand(-240, -80) + 'px');
        h.style.setProperty('--dur', rand(1.2, 2.1) + 's');
        h.style.animationDelay = rand(.15, .6) + 's';
        hearts.appendChild(h);
      }
    }

    function ensureAudio(){
      if(audioReady) return;
      const AC = window.AudioContext || window.webkitAudioContext;
      if(!AC) return;
      window.__ac = window.__ac || new AC();
      if(window.__ac.state === 'suspended'){
        window.__ac.resume().catch(()=>{});
      }
      audioReady = true;
    }

    function playMagicSound(){
      if(!window.__ac) return;
      const ac = window.__ac;
      const now = ac.currentTime;

      const notes = [523.25, 659.25, 783.99, 1046.5];
      notes.forEach((freq, i)=>{
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, now + i * 0.09);
        gain.gain.setValueAtTime(0.0001, now + i * 0.09);
        gain.gain.exponentialRampToValueAtTime(0.09, now + i * 0.09 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + i * 0.09 + 0.38);
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.start(now + i * 0.09);
        osc.stop(now + i * 0.09 + 0.42);
      });

      const shimmer = ac.createOscillator();
      const shimmerGain = ac.createGain();
      shimmer.type = 'sine';
      shimmer.frequency.setValueAtTime(1318.5, now + 0.12);
      shimmer.frequency.exponentialRampToValueAtTime(1760, now + 0.62);
      shimmerGain.gain.setValueAtTime(0.0001, now + 0.12);
      shimmerGain.gain.exponentialRampToValueAtTime(0.04, now + 0.18);
      shimmerGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.8);
      shimmer.connect(shimmerGain);
      shimmerGain.connect(ac.destination);
      shimmer.start(now + 0.12);
      shimmer.stop(now + 0.82);
    }

    function showCardsFast(){
      cardsWrap.classList.add('ready');
    }

    function hideCards(){
      cardsWrap.classList.remove('ready');
    }

    function playIntro(){
      clearTimeout(introTimer);

      intro.classList.remove('hide');
      intro.style.opacity = '1';
      intro.style.visibility = 'visible';

      hideCards();
      makeBurstParticles();
      playMagicSound();

      requestAnimationFrame(() => {
        showCardsFast();
      });

      introTimer = setTimeout(() => {
        intro.classList.add('hide');
      }, 2350);
    }

    function popText(text){
      resultPop.textContent = text;
      resultPop.classList.remove('show');
      void resultPop.offsetWidth;
      resultPop.classList.add('show');
    }

    document.addEventListener('pointerdown', () => {
      ensureAudio();
    }, { once:true });

    document.body.addEventListener('click', (e) => {
      const onCard = e.target.closest('.card');
      if(onCard) return;
      ensureAudio();
      playIntro();
    });

    cards.forEach(card => {
      card.addEventListener('click', () => {
        ensureAudio();
        popText(card.dataset.name + '!');
      });
    });

    window.addEventListener('resize', () => {
      makeBgStars();
    });

    makeBgStars();
    setTimeout(() => {
      ensureAudio();
      playIntro();
    }, 120);
  </script>
