<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffb7d8" />
  <title>兒童學習小遊戲</title>
  <style>
    :root{
      --bg1:#fff7fb;
      --bg2:#f4f0ff;
      --bg3:#fffaf0;
      --ink:#6c4e69;
      --pink:#ff8fbd;
      --pink2:#ffc5de;
      --purple:#b693ff;
      --purple2:#8e74ff;
      --gold:#ffca59;
      --blue:#8fc9ff;
      --green:#7fdaa5;
      --card:#ffffffee;
      --shadow:0 16px 42px rgba(166,116,166,.14);
      --radius:28px;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 15% 18%, rgba(255,255,255,.95) 0%, rgba(255,255,255,0) 22%),
        radial-gradient(circle at 82% 18%, rgba(255,238,197,.92) 0%, rgba(255,238,197,0) 18%),
        radial-gradient(circle at 28% 80%, rgba(255,214,233,.72) 0%, rgba(255,214,233,0) 26%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 48%, var(--bg3));
    }

    body{
      position:relative;
      overflow:hidden;
      user-select:none;
    }

    .bg-stars,
    .fx-layer,
    .confetti-layer,
    .intro-particles{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .star{
      position:absolute;
      width:10px;
      height:10px;
      border-radius:50%;
      background:radial-gradient(circle, #fff 0 30%, #ffe57f 31% 58%, rgba(255,255,255,0) 59%);
      filter:drop-shadow(0 0 10px rgba(255,255,255,.9));
      opacity:.9;
      animation:twinkle ease-in-out infinite;
    }

    @keyframes twinkle{
      0%,100%{transform:scale(.55);opacity:.35}
      50%{transform:scale(1.5);opacity:1}
    }

    .top-bar{
      position:absolute;
      top:max(12px, env(safe-area-inset-top));
      left:50%;
      transform:translateX(-50%);
      z-index:20;
      width:min(920px, calc(100% - 20px));
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.72);
      backdrop-filter:blur(10px);
      box-shadow:0 10px 28px rgba(163,120,166,.12);
      border:1px solid rgba(255,255,255,.8);
    }

    .score-chip,
    .mode-chip{
      display:flex;
      align-items:center;
      gap:8px;
      font-weight:800;
      color:#7d5b79;
      white-space:nowrap;
      min-width:0;
    }

    .mode-chip{
      flex:1;
      justify-content:center;
      text-align:center;
      font-size:14px;
    }

    .icon-btn{
      border:none;
      background:linear-gradient(180deg,#fff,#fff7fb);
      color:#7d5b79;
      border-radius:999px;
      height:42px;
      min-width:42px;
      padding:0 14px;
      font-size:14px;
      font-weight:800;
      box-shadow:0 8px 18px rgba(163,120,166,.10);
      cursor:pointer;
    }

    .icon-btn:active{transform:scale(.97)}

    .game{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-end;
      padding:
        calc(env(safe-area-inset-top) + 78px)
        16px
        max(18px, env(safe-area-inset-bottom))
        16px;
      z-index:5;
    }

    .question-wrap{
      width:min(980px, 100%);
      display:flex;
      flex-direction:column;
      align-items:center;
      margin-bottom:14px;
      transition:opacity .18s ease, transform .18s ease;
    }

    .question-bubble{
      min-height:64px;
      width:min(760px, 100%);
      padding:14px 18px;
      border-radius:24px;
      background:rgba(255,255,255,.82);
      backdrop-filter:blur(8px);
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      gap:4px;
    }

    .question-main{
      font-size:28px;
      font-weight:900;
      letter-spacing:.5px;
      color:#6f4d6d;
    }

    .question-sub{
      font-size:13px;
      font-weight:700;
      color:#9a7e99;
    }

    .cards{
      width:min(980px, 100%);
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:14px;
      opacity:0;
      transform:translateY(16px);
      transition:opacity .15s ease, transform .15s ease;
    }

    .cards.ready{
      opacity:1;
      transform:translateY(0);
    }

    .card{
      position:relative;
      min-height:220px;
      border:none;
      border-radius:var(--radius);
      background:linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.88));
      box-shadow:var(--shadow);
      overflow:hidden;
      cursor:pointer;
      padding:14px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
    }

    .card:active{transform:scale(.98)}
    .card[disabled]{opacity:.75;cursor:default}

    .card::before{
      content:"";
      position:absolute;
      inset:-2px;
      border-radius:inherit;
      padding:2px;
      background:linear-gradient(135deg, rgba(255,172,209,.95), rgba(187,147,255,.9), rgba(255,223,138,.92));
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite:xor;
      mask-composite:exclude;
      pointer-events:none;
    }

    .card-glow{
      position:absolute;
      width:140px;
      height:140px;
      top:-28px;
      right:-20px;
      border-radius:999px;
      background:radial-gradient(circle, rgba(255,192,218,.58), rgba(255,192,218,0));
      pointer-events:none;
    }

    .card-figure{
      width:100%;
      height:150px;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    .card-img{
      width:min(138px, 72%);
      height:min(138px, 72%);
      object-fit:contain;
      display:block;
      filter:drop-shadow(0 10px 20px rgba(0,0,0,.10));
    }

    .fallback-svg{
      width:min(148px, 78%);
      height:min(148px, 78%);
      display:none;
      filter:drop-shadow(0 10px 18px rgba(0,0,0,.08));
    }

    .card-label{
      margin-top:8px;
      text-align:center;
      font-size:23px;
      font-weight:900;
      color:#72516d;
      letter-spacing:.5px;
    }

    .card-sub{
      margin-top:4px;
      font-size:13px;
      font-weight:700;
      color:#9a7f98;
    }

    .footer-tip{
      margin-top:12px;
      font-size:13px;
      font-weight:700;
      color:#917b90;
      text-align:center;
      text-shadow:0 1px 0 rgba(255,255,255,.85);
    }

    .correct-mark,
    .wrong-mark{
      position:absolute;
      inset:auto 50% 18px auto;
      transform:translateX(50%);
      font-size:28px;
      font-weight:900;
      opacity:0;
      pointer-events:none;
    }

    .correct-mark{color:#4fb97e}
    .wrong-mark{color:#ff709f}

    .show-mark{
      animation:markPop .7s ease forwards;
    }

    @keyframes markPop{
      0%{opacity:0;transform:translateX(50%) scale(.4)}
      25%{opacity:1;transform:translateX(50%) scale(1.16)}
      100%{opacity:0;transform:translateX(50%) scale(1)}
    }

    .message-pop{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%) scale(.8);
      z-index:30;
      padding:16px 24px;
      border-radius:999px;
      background:rgba(255,255,255,.92);
      box-shadow:0 18px 36px rgba(163,120,166,.16);
      font-size:24px;
      font-weight:900;
      color:#765672;
      opacity:0;
      pointer-events:none;
    }

    .message-pop.show{
      animation:popText .9s ease forwards;
    }

    @keyframes popText{
      0%{opacity:0;transform:translate(-50%,-50%) scale(.6)}
      20%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
      70%{opacity:1;transform:translate(-50%,-50%) scale(1)}
      100%{opacity:0;transform:translate(-50%,-50%) scale(.96)}
    }

    .confetti,
    .spark,
    .mini-heart{
      position:absolute;
      left:50%;
      top:50%;
      pointer-events:none;
      opacity:0;
    }

    .confetti{
      width:12px;
      height:18px;
      border-radius:8px;
      animation:confettiFly var(--dur) ease-out forwards;
      background:linear-gradient(180deg, #fff, #ffd96d);
      box-shadow:0 0 12px rgba(255,255,255,.8);
    }

    @keyframes confettiFly{
      0%{
        opacity:0;
        transform:translate(-50%,-50%) scale(.35) rotate(0deg);
      }
      12%{opacity:1}
      100%{
        opacity:0;
        transform:
          translate(calc(-50% + var(--x)), calc(-50% + var(--y)))
          scale(1.2)
          rotate(var(--r));
      }
    }

    .spark{
      width:20px;
      height:20px;
      animation:sparkFly var(--dur) ease-out forwards;
    }

    .spark::before,
    .spark::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      border-radius:999px;
      background:linear-gradient(180deg, #fff, #ffd86b);
      box-shadow:0 0 12px rgba(255,255,255,.8);
    }

    .spark::before{width:5px;height:18px}
    .spark::after{width:18px;height:5px}

    @keyframes sparkFly{
      0%{
        opacity:0;
        transform:translate(-50%,-50%) scale(.3) rotate(0deg);
      }
      12%{opacity:1}
      100%{
        opacity:0;
        transform:
          translate(calc(-50% + var(--x)), calc(-50% + var(--y)))
          scale(1.35)
          rotate(260deg);
      }
    }

    .mini-heart{
      width:14px;
      height:14px;
      background:linear-gradient(135deg, #ff90b9, #ffc3da);
      transform:translate(-50%,-50%) rotate(45deg);
      border-radius:4px;
      animation:heartRise var(--dur) ease-out forwards;
      filter:drop-shadow(0 0 10px rgba(255,182,210,.75));
    }
    .mini-heart::before,
    .mini-heart::after{
      content:"";
      position:absolute;
      width:14px;height:14px;
      background:inherit;
      border-radius:50%;
    }
    .mini-heart::before{left:-7px;top:0}
    .mini-heart::after{left:0;top:-7px}

    @keyframes heartRise{
      0%{
        opacity:0;
        transform:translate(-50%,-50%) rotate(45deg) scale(.3);
      }
      12%{opacity:1}
      100%{
        opacity:0;
        transform:
          translate(calc(-50% + var(--x)), calc(-50% + var(--y)))
          rotate(45deg)
          scale(1.35);
      }
    }

    /* 啟動畫面 */
    .start-overlay{
      position:absolute;
      inset:0;
      z-index:80;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.25), rgba(255,255,255,0) 48%),
        linear-gradient(135deg, rgba(255,246,251,.92), rgba(245,239,255,.9));
      transition:opacity .35s ease, visibility .35s ease;
    }

    .start-overlay.hide{
      opacity:0;
      visibility:hidden;
    }

    .start-card{
      width:min(560px, calc(100% - 28px));
      padding:28px 20px 24px;
      border-radius:34px;
      background:rgba(255,255,255,.88);
      backdrop-filter:blur(12px);
      box-shadow:0 20px 50px rgba(163,120,166,.16);
      text-align:center;
      border:1px solid rgba(255,255,255,.8);
    }

    .start-title{
      font-size:32px;
      font-weight:900;
      color:#6f4d6c;
      margin-bottom:8px;
    }

    .start-text{
      font-size:15px;
      font-weight:700;
      color:#8f7790;
      line-height:1.7;
    }

    .start-btn{
      margin-top:18px;
      min-width:190px;
      height:56px;
      border:none;
      border-radius:999px;
      background:linear-gradient(135deg, #ff9ec8, #c19bff);
      color:#fff;
      font-size:20px;
      font-weight:900;
      box-shadow:0 14px 28px rgba(193,155,255,.28);
      cursor:pointer;
    }

    .start-btn:active{transform:scale(.98)}

    /* 滿版獨角獸動畫 */
    .intro{
      position:absolute;
      inset:0;
      z-index:70;
      pointer-events:none;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      opacity:0;
      visibility:hidden;
    }

    .intro.show{
      opacity:1;
      visibility:visible;
    }

    .intro.hide{
      animation:introFade .32s ease forwards;
    }

    @keyframes introFade{
      to{opacity:0;visibility:hidden}
    }

    .intro-ring{
      position:absolute;
      left:50%;
      top:50%;
      width:26vmin;
      height:26vmin;
      margin-left:-13vmin;
      margin-top:-13vmin;
      border-radius:50%;
      border:4px solid rgba(255,255,255,.72);
      box-shadow:0 0 30px rgba(255,255,255,.8), 0 0 80px rgba(255,177,220,.55);
      opacity:0;
      animation:ringBoom 1.5s ease-out forwards;
    }
    .intro-ring.r2{animation-delay:.16s}
    .intro-ring.r3{animation-delay:.30s}

    @keyframes ringBoom{
      0%{transform:scale(.22);opacity:0}
      20%{opacity:1}
      100%{transform:scale(2.9);opacity:0}
    }

    .rainbow{
      position:absolute;
      left:50%;
      top:54%;
      width:min(132vmin, 1220px);
      height:min(52vmin, 480px);
      transform:translate(-58%, -50%) rotate(-8deg) scale(.55);
      opacity:0;
      filter:blur(.4px) drop-shadow(0 0 24px rgba(255,255,255,.8));
      animation:rainbowIn 2.05s ease forwards;
    }

    .rainbow .band{
      position:absolute;
      left:0; right:0;
      border-radius:999px;
    }

    .rainbow .b1{top:0;height:18%;background:linear-gradient(90deg,#ff8aa8,#ff9fc7)}
    .rainbow .b2{top:18%;height:18%;background:linear-gradient(90deg,#ffb26e,#ffd76a)}
    .rainbow .b3{top:36%;height:18%;background:linear-gradient(90deg,#ffe26d,#fff3a9)}
    .rainbow .b4{top:54%;height:18%;background:linear-gradient(90deg,#95efb5,#73dfb8)}
    .rainbow .b5{top:72%;height:18%;background:linear-gradient(90deg,#8ecfff,#8dacff)}
    .rainbow .b6{top:90%;height:10%;background:linear-gradient(90deg,#c59dff,#f1b8ff)}

    @keyframes rainbowIn{
      0%{transform:translate(-88%, -42%) rotate(-16deg) scale(.34);opacity:0}
      18%{opacity:1}
      46%{transform:translate(-64%, -48%) rotate(-10deg) scale(.84);opacity:1}
      100%{transform:translate(-58%, -50%) rotate(-8deg) scale(1);opacity:.96}
    }

    .unicorn-stage{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .unicorn-wrap{
      width:min(82vmin, 760px);
      aspect-ratio:1/1;
      transform:translate(42vw, 18vh) scale(.22) rotate(-10deg);
      opacity:0;
      filter:drop-shadow(0 32px 42px rgba(239,136,190,.22)) drop-shadow(0 0 26px rgba(255,255,255,.74));
      animation:unicornFly 2.2s cubic-bezier(.2,.9,.2,1) forwards;
    }

    @keyframes unicornFly{
      0%{opacity:0;transform:translate(42vw,18vh) scale(.22) rotate(-10deg)}
      18%{opacity:1;transform:translate(12vw,5vh) scale(.62) rotate(-6deg)}
      44%{opacity:1;transform:translate(0,0) scale(1.08) rotate(0deg)}
      58%{transform:translate(0,-8px) scale(1.02) rotate(0deg)}
      72%{transform:translate(0,4px) scale(1.05) rotate(-1deg)}
      86%{transform:translate(0,-2px) scale(1.03) rotate(1deg)}
      100%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg)}
    }

    .unicorn-svg{
      width:100%;
      height:100%;
      display:block;
      overflow:visible;
    }

    .body-bob{transform-origin:center;animation:bodyBob .58s ease-in-out infinite alternate}
    .mane-wave{transform-origin:54% 34%;animation:maneWave .7s ease-in-out infinite alternate}
    .tail-wave{transform-origin:76% 62%;animation:tailWave .48s ease-in-out infinite alternate}
    .eye-blink{transform-origin:center;animation:blink 4s infinite}
    .wing-glow{animation:wingGlow .8s ease-in-out infinite alternate}

    @keyframes tailWave{from{transform:rotate(-3deg)}to{transform:rotate(4deg)}}
    @keyframes maneWave{from{transform:rotate(-2deg) translateY(0)}to{transform:rotate(2deg) translateY(1px)}}
    @keyframes bodyBob{from{transform:translateY(0)}to{transform:translateY(-3px)}}
    @keyframes blink{0%,46%,48%,100%{transform:scaleY(1)}47%{transform:scaleY(.08)}}
    @keyframes wingGlow{from{opacity:.55}to{opacity:1}}

    .intro-particle{
      position:absolute;
      left:50%;
      top:50%;
      pointer-events:none;
      opacity:0;
    }

    .intro-particle.spark{
      width:20px;
      height:20px;
      animation:sparkFly var(--dur) ease-out forwards;
    }

    .intro-particle.heart{
      width:16px;
      height:16px;
      border-radius:4px;
      transform:translate(-50%,-50%) rotate(45deg);
      background:linear-gradient(135deg,#ff90b9,#ffc7dd);
      animation:heartRise var(--dur) ease-out forwards;
      filter:drop-shadow(0 0 10px rgba(255,182,210,.7));
    }

    .intro-particle.heart::before,
    .intro-particle.heart::after{
      content:"";
      position:absolute;
      width:16px;height:16px;
      border-radius:50%;
      background:inherit;
    }
    .intro-particle.heart::before{left:-8px;top:0}
    .intro-particle.heart::after{left:0;top:-8px}

    @media (max-width: 900px){
      .question-main{font-size:24px}
      .card{min-height:210px}
      .card-label{font-size:21px}
    }

    @media (max-width: 640px){
      .top-bar{padding:9px 12px}
      .mode-chip{font-size:12px}
      .question-bubble{min-height:58px;padding:12px 14px}
      .question-main{font-size:22px}
      .cards{gap:12px}
      .card{min-height:188px;padding:12px}
      .card-figure{height:122px}
      .card-label{font-size:19px}
      .start-title{font-size:28px}
      .start-text{font-size:14px}
      .start-btn{height:52px;font-size:18px}
    }
  </style>
</head>
<body>
  <div class="bg-stars" id="bgStars"></div>
  <div class="fx-layer" id="fxLayer"></div>
  <div class="confetti-layer" id="confettiLayer"></div>
  <div class="intro-particles" id="introParticles"></div>

  <div class="top-bar">
    <div class="score-chip">⭐ <span id="scoreText">0</span></div>
    <div class="mode-chip" id="modeText">卡通動物答題</div>
    <div style="display:flex; gap:8px;">
      <button class="icon-btn" id="speakBtn">再聽一次</button>
      <button class="icon-btn" id="magicBtn">魔法動畫</button>
    </div>
  </div>

  <div class="game">
    <div class="question-wrap">
      <div class="question-bubble">
        <div class="question-main" id="questionMain">Tap Start</div>
        <div class="question-sub" id="questionSub">Listen and choose the correct card</div>
      </div>
    </div>

    <div class="cards" id="cards"></div>
    <div class="footer-tip">這版改成：CDN 載入失敗時，會自動切內建圖，不會再整排沒圖。</div>
  </div>

  <div class="message-pop" id="messagePop">Good job!</div>

  <div class="start-overlay" id="startOverlay">
    <div class="start-card">
      <div class="start-title">兒童學習小遊戲</div>
      <div class="start-text">
        這版已修正外部圖片不穩問題。<br>
        先點開始，播放滿版獨角獸動畫，動畫結束會立刻出題。
      </div>
      <button class="start-btn" id="startBtn">開始遊戲</button>
    </div>
  </div>

  <div class="intro" id="intro">
    <div class="intro-ring"></div>
    <div class="intro-ring r2"></div>
    <div class="intro-ring r3"></div>

    <div class="rainbow" aria-hidden="true">
      <div class="band b1"></div>
      <div class="band b2"></div>
      <div class="band b3"></div>
      <div class="band b4"></div>
      <div class="band b5"></div>
      <div class="band b6"></div>
    </div>

    <div class="unicorn-stage">
      <div class="unicorn-wrap">
        <svg class="unicorn-svg" viewBox="0 0 700 700" aria-hidden="true">
          <defs>
            <radialGradient id="gGlow" cx="50%" cy="50%" r="60%">
              <stop offset="0%" stop-color="#fff9ff" stop-opacity="1"/>
              <stop offset="60%" stop-color="#ffd8ed" stop-opacity=".8"/>
              <stop offset="100%" stop-color="#ffd8ed" stop-opacity="0"/>
            </radialGradient>
            <linearGradient id="gMane" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffb1d0"/>
              <stop offset="50%" stop-color="#ff8db8"/>
              <stop offset="100%" stop-color="#ffc7dc"/>
            </linearGradient>
            <linearGradient id="gHorn" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#ffd86b"/>
              <stop offset="100%" stop-color="#ffb72b"/>
            </linearGradient>
            <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="14" result="blur"/>
              <feMerge>

  </div>

  <script>
    const animals = [
      { en:'dog', zh:'小狗', code:'1f436', cat:'pet', color:'#ffe9da' },
      { en:'cat', zh:'小貓', code:'1f431', cat:'pet', color:'#efe7ff' },
      { en:'rabbit', zh:'兔子', code:'1f430', cat:'pet', color:'#ffe6f5' },
      { en:'hamster', zh:'倉鼠', code:'1f439', cat:'pet', color:'#fff0d9' },
      { en:'mouse', zh:'老鼠', code:'1f42d', cat:'pet', color:'#eef2ff' },
      { en:'horse', zh:'小馬', code:'1f434', cat:'pet', color:'#ffe9dd' },
      { en:'unicorn', zh:'獨角獸', code:'1f984', cat:'pet', color:'#ffe9f5' },

      { en:'tiger', zh:'老虎', code:'1f42f', cat:'wild', color:'#fff0d6' },
      { en:'lion', zh:'獅子', code:'1f981', cat:'wild', color:'#fff2d8' },
      { en:'bear', zh:'熊', code:'1f43b', cat:'wild', color:'#f4e6db' },
      { en:'panda', zh:'貓熊', code:'1f43c', cat:'wild', color:'#f5f5f5' },
      { en:'koala', zh:'無尾熊', code:'1f428', cat:'wild', color:'#edf0ff' },
      { en:'wolf', zh:'狼', code:'1f43a', cat:'wild', color:'#eef1f8' },
      { en:'monkey', zh:'猴子', code:'1f435', cat:'wild', color:'#f7eadf' },
      { en:'frog', zh:'青蛙', code:'1f438', cat:'wild', color:'#e8fff0' },
      { en:'pig', zh:'小豬', code:'1f437', cat:'farm', color:'#ffe3ee' },
      { en:'cow', zh:'乳牛', code:'1f42e', cat:'farm', color:'#f7f7f7' },

      { en:'chicken', zh:'雞', code:'1f414', cat:'farm', color:'#fff1d7' },
      { en:'bird', zh:'小鳥', code:'1f426', cat:'farm', color:'#dff2ff' },
      { en:'duck', zh:'鴨子', code:'1f986', cat:'farm', color:'#fff1cd' },
      { en:'eagle', zh:'老鷹', code:'1f985', cat:'wild', color:'#f1e9dc' },
      { en:'owl', zh:'貓頭鷹', code:'1f989', cat:'wild', color:'#f4eadf' },
      { en:'penguin', zh:'企鵝', code:'1f427', cat:'ocean', color:'#eef2ff' },

      { en:'bee', zh:'蜜蜂', code:'1f41d', cat:'insect', color:'#fff3cf' },
      { en:'bug', zh:'毛毛蟲', code:'1f41b', cat:'insect', color:'#eaffdc' },
      { en:'butterfly', zh:'蝴蝶', code:'1f98b', cat:'insect', color:'#ffe8fb' },
      { en:'lady beetle', zh:'瓢蟲', code:'1f41e', cat:'insect', color:'#ffe0de' },
      { en:'ant', zh:'螞蟻', code:'1f41c', cat:'insect', color:'#efe8e5' },
      { en:'snail', zh:'蝸牛', code:'1f40c', cat:'insect', color:'#f4ecde' },

      { en:'fish', zh:'魚', code:'1f41f', cat:'ocean', color:'#dff5ff' },
      { en:'tropical fish', zh:'熱帶魚', code:'1f420', cat:'ocean', color:'#e0f7ff' },
      { en:'blowfish', zh:'河豚', code:'1f421', cat:'ocean', color:'#fff0cf' },
      { en:'dolphin', zh:'海豚', code:'1f42c', cat:'ocean', color:'#dff2ff' },
      { en:'whale', zh:'鯨魚', code:'1f433', cat:'ocean', color:'#e3f0ff' },
      { en:'shark', zh:'鯊魚', code:'1f988', cat:'ocean', color:'#eaf2fb' },
      { en:'octopus', zh:'章魚', code:'1f419', cat:'ocean', color:'#ffe1f1' },
      { en:'seal', zh:'海豹', code:'1f9ad', cat:'ocean', color:'#eef2f7' },
      { en:'crab', zh:'螃蟹', code:'1f980', cat:'ocean', color:'#ffe6dc' },
      { en:'lobster', zh:'龍蝦', code:'1f99e', cat:'ocean', color:'#ffe3de' },

      { en:'turtle', zh:'烏龜', code:'1f422', cat:'reptile', color:'#e8ffe8' },
      { en:'snake', zh:'蛇', code:'1f40d', cat:'reptile', color:'#eaffdf' },
      { en:'crocodile', zh:'鱷魚', code:'1f40a', cat:'reptile', color:'#e9f7dc' },

      { en:'sauropod', zh:'長頸龍', code:'1f995', cat:'dino', color:'#e8fff3' },
      { en:'t-rex', zh:'暴龍', code:'1f996', cat:'dino', color:'#f0ffe5' }
    ];

    const cardsEl = document.getElementById('cards');
    const questionMain = document.getElementById('questionMain');
    const questionSub = document.getElementById('questionSub');
    const scoreText = document.getElementById('scoreText');
    const modeText = document.getElementById('modeText');
    const messagePop = document.getElementById('messagePop');
    const confettiLayer = document.getElementById('confettiLayer');
    const fxLayer = document.getElementById('fxLayer');
    const bgStars = document.getElementById('bgStars');
    const intro = document.getElementById('intro');
    const introParticles = document.getElementById('introParticles');
    const startOverlay = document.getElementById('startOverlay');
    const startBtn = document.getElementById('startBtn');
    const speakBtn = document.getElementById('speakBtn');
    const magicBtn = document.getElementById('magicBtn');

    let currentRound = null;
    let score = 0;
    let started = false;
    let busy = false;
    let audioCtx = null;
    let voiceReady = false;

    function rand(min, max){ return Math.random() * (max - min) + min; }
    function pick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }
    function shuffle(arr){
      const a = [...arr];
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function makeBgStars(){
      bgStars.innerHTML = '';
      const total = window.innerWidth < 700 ? 28 : 40;
      for(let i=0;i<total;i++){
        const s = document.createElement('div');
        s.className = 'star';
        s.style.left = rand(2,98) + '%';
        s.style.top = rand(3,96) + '%';
        s.style.animationDuration = rand(1.2,2.9) + 's';
        s.style.animationDelay = rand(0,2) + 's';
        s.style.transform = `scale(${rand(.65,1.5)})`;
        bgStars.appendChild(s);
      }
    }

    function ensureAudio(){
      if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) audioCtx = new AC();
      }
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
      voiceReady = true;
    }

    function playMagicSound(){
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const notes = [523.25, 659.25, 783.99, 1046.5];
      notes.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, now + i * 0.09);
        gain.gain.setValueAtTime(0.0001, now + i * 0.09);
        gain.gain.exponentialRampToValueAtTime(0.08, now + i * 0.09 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + i * 0.09 + 0.38);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now + i * 0.09);
        osc.stop(now + i * 0.09 + 0.42);
      });
    }

    function speak(text, rate = 0.9, pitch = 1.12){
      return new Promise(resolve => {
        if (!('speechSynthesis' in window) || !voiceReady) {
          resolve();
          return;
        }
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'en-US';
        utter.rate = rate;
        utter.pitch = pitch;
        const voices = window.speechSynthesis.getVoices();
        const preferred =
          voices.find(v => /Samantha|Karen|Tessa|Moira|Ava|Allison/i.test(v.name)) ||
          voices.find(v => /female|woman/i.test(v.name)) ||
          voices.find(v => /^en/i.test(v.lang)) ||
          null;
        if (preferred) utter.voice = preferred;
        utter.onend = () => resolve();
        utter.onerror = () => resolve();
        window.speechSynthesis.speak(utter);
      });
    }

    function twemojiUrl(code){
      return `https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${code}.svg`;
    }

    function fallbackAnimalSVG(item){
      const label = item.en.replace(/\b\w/g, c => c.toUpperCase());
      const bg = item.color || '#ffe9f2';
      const accent = '#7a5773';
      const emoji = emojiFromCode(item.code);
      return `
        <svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="${bg}"/>
              <stop offset="100%" stop-color="#ffffff"/>
            </linearGradient>
          </defs>
          <rect x="10" y="10" width="160" height="160" rx="36" fill="url(#g)" stroke="#f3dceb"/>
          <circle cx="90" cy="88" r="50" fill="rgba(255,255,255,.72)"/>
          <text x="90" y="102" font-size="56" text-anchor="middle">${emoji}</text>
          <text x="90" y="150" font-size="12" font-weight="700" fill="${accent}" text-anchor="middle">${label}</text>
        </svg>
      `;
    }

    function emojiFromCode(code){
      return code.split('-').map(part => String.fromCodePoint(parseInt(part,16))).join('');
    }

    function renderCard(item, idx){
      const card = document.createElement('button');
      card.className = 'card';
      card.dataset.answer = item.en;

      const imgUrl = twemojiUrl(item.code);
      const fallback = fallbackAnimalSVG(item);

      card.innerHTML = `
        <span class="card-glow"></span>
        <div class="card-figure">
          <img class="card-img" src="${imgUrl}" alt="${item.en}" loading="eager" decoding="async">
          <div class="fallback-svg">${fallback}</div>
        </div>
        <div class="card-label">${capitalize(item.en)}</div>
        <div class="card-sub">${item.zh}</div>
        <div class="correct-mark">✓</div>
        <div class="wrong-mark">✕</div>
      `;

      const img = card.querySelector('.card-img');
      const fallbackEl = card.querySelector('.fallback-svg');
      img.addEventListener('error', () => {
        img.style.display = 'none';
        fallbackEl.style.display = 'block';
      }, { once:true });

      img.addEventListener('load', () => {
        fallbackEl.style.display = 'none';
      }, { once:true });

      card.addEventListener('click', () => onPick(item, card));
      return card;
    }

    function capitalize(s){
      return s.replace(/\b\w/g, c => c.toUpperCase());
    }

    function createRound(){
      const correct = pick(animals);
      const pool = animals.filter(a => a.en !== correct.en);
      const wrongs = shuffle(pool).slice(0,3);
      const options = shuffle([correct, ...wrongs]);
      return { correct, options };
    }

    function renderRound(round){
      cardsEl.innerHTML = '';
      round.options.forEach((item, idx) => {
        cardsEl.appendChild(renderCard(item, idx));
      });

      requestAnimationFrame(() => {
        cardsEl.classList.add('ready');
      });

      questionMain.textContent = `Find: ${capitalize(round.correct.en)}`;
      questionSub.textContent = `Listen and choose the correct card · ${round.correct.zh}`;
      modeText.textContent = `目前題目：${round.correct.zh}`;
    }

    async function askQuestion(repeat = false){
      if (!currentRound) return;
      if (repeat) {
        await speak(currentRound.correct.en, 0.88, 1.1);
        await delay(220);
        await speak(currentRound.correct.en, 0.88, 1.1);
      } else {
        await speak(currentRound.correct.en, 0.88, 1.1);
      }
    }

    async function nextRound(withIntro = false){
      busy = true;
      cardsEl.classList.remove('ready');

      if (withIntro) {
        playIntro();
        await delay(240);
      }

      currentRound = createRound();
      renderRound(currentRound);

      await delay(120);
      busy = false;

      if (withIntro) {
        await delay(1180);
      } else {
        await delay(150);
      }

      askQuestion(false);
    }

    async function onPick(item, card){
      if (busy || !currentRound) return;
      busy = true;

      const allCards = [...cardsEl.querySelectorAll('.card')];
      allCards.forEach(c => c.disabled = true);

      if (item.en === currentRound.correct.en) {
        score += 1;
        scoreText.textContent = score;
        showPop('做得很好');
        card.querySelector('.correct-mark').classList.remove('show-mark');
        void card.offsetWidth;
        card.querySelector('.correct-mark').classList.add('show-mark');
        burstAtCard(card);
        celebrate();
        await speak('Good job. Next one.', 0.95, 1.18);
        await delay(500);
        await nextRound(false);
      } else {
        card.querySelector('.wrong-mark').classList.remove('show-mark');
        void card.offsetWidth;
        card.querySelector('.wrong-mark').classList.add('show-mark');
        showPop('再試一次');
        await speak('Keep trying.', 0.92, 1.08);
        await delay(1000);
        allCards.forEach(c => c.disabled = false);
        busy = false;
        await askQuestion(true);
      }
    }

    function showPop(text){
      messagePop.textContent = text;
      messagePop.classList.remove('show');
      void messagePop.offsetWidth;
      messagePop.classList.add('show');
    }

    function celebrate(){
      confettiLayer.innerHTML = '';
      const total = window.innerWidth < 700 ? 18 : 28;

      for(let i=0;i<total;i++){
        const e = document.createElement('div');
        e.className = 'confetti';
        const angle = rand(0, Math.PI * 2);
        const dist = rand(90, window.innerWidth < 700 ? 200 : 320);
        e.style.setProperty('--x', `${Math.cos(angle) * dist}px`);
        e.style.setProperty('--y', `${Math.sin(angle) * dist}px`);
        e.style.setProperty('--r', `${rand(180, 520)}deg`);
        e.style.setProperty('--dur', `${rand(1.1, 1.9)}s`);
        e.style.background = pick([
          'linear-gradient(180deg,#fff,#ffd96d)',
          'linear-gradient(180deg,#fff,#ff97be)',
          'linear-gradient(180deg,#fff,#9ac7ff)',
          'linear-gradient(180deg,#fff,#bfa0ff)',
          'linear-gradient(180deg,#fff,#8fdfb7)'
        ]);
        confettiLayer.appendChild(e);
      }

      for(let i=0;i<10;i++){
        const h = document.createElement('div');
        h.className = 'mini-heart';
        h.style.setProperty('--x', `${rand(-220, 220)}px`);
        h.style.setProperty('--y', `${rand(-220, -70)}px`);
        h.style.setProperty('--dur', `${rand(1.1, 1.8)}s`);
        confettiLayer.appendChild(h);
      }

      setTimeout(() => confettiLayer.innerHTML = '', 1900);
    }

    function burstAtCard(card){
      const rect = card.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      for(let i=0;i<16;i++){
        const s = document.createElement('div');
        s.className = 'spark';
        const angle = rand(0, Math.PI * 2);
        const dist = rand(40, 130);
        s.style.left = `${cx}px`;
        s.style.top = `${cy}px`;
        s.style.setProperty('--x', `${Math.cos(angle) * dist}px`);
        s.style.setProperty('--y', `${Math.sin(angle) * dist}px`);
        s.style.setProperty('--dur', `${rand(.8, 1.3)}s`);
        fxLayer.appendChild(s);
      }

      setTimeout(() => fxLayer.innerHTML = '', 1400);
    }

    function playIntro(){
      intro.classList.remove('hide');
      intro.classList.add('show');
      introParticles.innerHTML = '';
      playMagicSound();

      const sparkCount = window.innerWidth < 700 ? 24 : 40;
      const heartCount = window.innerWidth < 700 ? 8 : 14;

      for(let i=0;i<sparkCount;i++){
        const e = document.createElement('div');
        e.className = 'intro-particle spark';
        const angle = rand(0, Math.PI * 2);
        const dist = rand(110, window.innerWidth < 700 ? 220 : 340);
        e.style.setProperty('--x', `${Math.cos(angle) * dist}px`);
        e.style.setProperty('--y', `${Math.sin(angle) * dist}px`);
        e.style.setProperty('--dur', `${rand(1.0, 1.7)}s`);
        e.style.animationDelay = `${rand(.03, .3)}s`;
        introParticles.appendChild(e);
      }

      for(let i=0;i<heartCount;i++){
        const h = document.createElement('div');
        h.className = 'intro-particle heart';
        h.style.setProperty('--x', `${rand(-220, 220)}px`);
        h.style.setProperty('--y', `${rand(-240, -80)}px`);
        h.style.setProperty('--dur', `${rand(1.15, 1.95)}s`);
        h.style.animationDelay = `${rand(.1, .5)}s`;
        introParticles.appendChild(h);
      }

      setTimeout(() => {
        intro.classList.add('hide');
        setTimeout(() => {
          intro.classList.remove('show');
          introParticles.innerHTML = '';
        }, 340);
      }, 2300);
    }

    function delay(ms){
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function startGame(){
      ensureAudio();
      started = true;
      startOverlay.classList.add('hide');
      playIntro();
      await delay(1350);
      nextRound(true);
    }

    startBtn.addEventListener('click', startGame);

    speakBtn.addEventListener('click', async () => {
      ensureAudio();
      if (!currentRound || busy) return;
      await askQuestion(false);
    });

    magicBtn.addEventListener('click', () => {
      ensureAudio();
      playIntro();
    });

    window.addEventListener('pointerdown', () => {
      ensureAudio();
      if ('speechSynthesis' in window) window.speechSynthesis.getVoices();
    }, { once:true });

    if ('speechSynthesis' in window) {
      window.speechSynthesis.onvoiceschanged = () => {
        window.speechSynthesis.getVoices();
      };
    }

    window.addEventListener('resize', makeBgStars);

    makeBgStars();
  </script>
